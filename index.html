<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rise Rundown Dashboard</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23f59e0b'/%3E%3Cstop offset='100%25' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='%2318181b'/%3E%3Ccircle cx='50' cy='50' r='30' fill='url(%23g)'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23f59e0b'/%3E%3Cstop offset='100%25' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='%2318181b'/%3E%3Ccircle cx='50' cy='50' r='30' fill='url(%23g)'/%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { 
            --bg: #09090b; 
            --card: #18181b; 
            --text: #f3f4f6; 
            --accent: #8b5cf6; 
            --border: #27272a; 
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* Hide scrollbar for main content area but keep functionality */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-content { display: none; padding-top: 8px; padding-bottom: 24px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-btn { 
            color: #52525b; transition: all 0.2s; display: flex; flex-direction: column; 
            align-items: center; gap: 4px; font-size: 11px; font-weight: 600; 
            padding: 8px; flex: 1; border-radius: 12px;
        }
        .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn.active svg { stroke: var(--accent); }

        .sched-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 0 24px 0; }
        .btn-nav-day { 
            font-size: 1.25rem; font-weight: 800; width: 60px; height: 60px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 20px; background: var(--card); color: white; 
            border: 2px solid var(--border); transition: all 0.2s; cursor: pointer; flex-shrink: 0;
        }
        .btn-nav-day:active { background: #3f3f46; transform: scale(0.95); border-color: var(--accent); }
        .day-label { 
            font-weight: 800; font-size: 1.25rem; color: white; flex-grow: 1;
            text-align: center; text-transform: uppercase; letter-spacing: 0.05em; 
            background: var(--card); border: 2px solid var(--border); border-radius: 20px; 
            cursor: pointer; height: 60px; display: flex; align-items: center; justify-content: center;
        }
        .day-label:active { background: #27272a; }

        .item-card { 
            background: var(--card); padding: 16px; border-radius: 20px; 
            border: 1px solid var(--border); margin-bottom: 12px; display: flex; gap: 14px; align-items: flex-start; 
        }

        .news-brand-badge {
            width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.2rem; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
        }
        
        .video-thumb { 
            width: 120px; height: 75px; background: #27272a; 
            border-radius: 10px; flex-shrink: 0; object-fit: cover; 
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
        }

        .line-clamp-2 {
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        
        #status-indicator { transition: background 0.3s ease, box-shadow 0.3s ease; }
        
        .tide-graph-container {
            width: 100%; height: 140px; margin-top: 16px; position: relative;
        }
        .tide-wave { fill: rgba(139, 92, 246, 0.15); stroke: var(--accent); stroke-width: 4; }
        .tide-point { fill: var(--text); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>

<body class="max-w-md mx-auto h-[100dvh] flex flex-col bg-zinc-950 text-zinc-100 shadow-2xl shadow-black relative overflow-hidden">

    <!-- Header: Pinned to Top -->
    <header class="flex-none bg-zinc-950/95 backdrop-blur-md border-b border-zinc-800 p-4 px-5 flex items-center justify-between z-50">
        <div class="flex items-center gap-3">
            <svg width="40" height="40" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id='gradHead' x1='0' y1='0' x2='1' y2='1'>
                        <stop offset='0%' stop-color='#f59e0b'/>
                        <stop offset='100%' stop-color='#8b5cf6'/>
                    </linearGradient>
                </defs>
                <rect width='100' height='100' rx='22' fill='#18181b'/>
                <circle cx='50' cy='50' r='30' fill='url(#gradHead)'/>
            </svg>
            <div>
                <h1 class="text-xl font-bold text-white tracking-tight leading-none">Rise</h1>
                <p id="date-display" class="text-[11px] text-zinc-400 font-bold uppercase tracking-wider mt-1"></p>
            </div>
        </div>
        <div id="status-indicator" class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
    </header>

    <!-- Main Content: Scrollable Area -->
    <main class="flex-1 overflow-y-auto overflow-x-hidden hide-scrollbar px-4 pt-4 pb-8">
        
        <section id="tab-weather" class="tab-content active">
            <div class="bg-zinc-900 rounded-2xl p-1.5 flex border border-zinc-800 mb-6">
                <button onclick="setLoc('dg')" id="btn-dg" class="flex-1 py-3 rounded-xl font-bold text-sm bg-zinc-800 text-white transition-all shadow-sm">Deansgrange</button>
                <button onclick="setLoc('sp')" id="btn-sp" class="flex-1 py-3 rounded-xl font-bold text-sm text-zinc-500 transition-all">Spanish Point</button>
            </div>
            
            <!-- Dashboard Weather Card -->
            <div class="bg-zinc-900 rounded-3xl p-5 border border-zinc-800 mb-6 shadow-xl relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-accent opacity-5 rounded-bl-full pointer-events-none"></div>
                <div class="flex gap-4 items-center">
                    <div id="w-temp-box" class="w-[45%] border-r border-zinc-800 pr-4">
                        <div class="animate-pulse w-16 h-16 bg-zinc-800 rounded-full mb-2"></div>
                    </div>
                    <div id="w-desc-box" class="w-[55%] pl-2">
                        <div class="text-zinc-500 text-sm">Fetching forecast...</div>
                    </div>
                </div>
            </div>
            
            <!-- Dashboard Tide Card -->
            <div id="tide-content" class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 text-white shadow-xl">
                <div class="flex justify-between items-end mb-2">
                    <p class='font-bold text-xl'>Tide Forecast</p>
                    <p id="tide-text" class="text-[11px] font-bold uppercase tracking-wider text-accent"></p>
                </div>
                <div id="tide-graph-wrapper" class="tide-graph-container">
                    <!-- SVG injected via JS -->
                </div>
            </div>
        </section>

        <section id="tab-schedule" class="tab-content">
            <div class="sched-nav">
                <button onclick="changeDay(-1)" class="btn-nav-day">◀</button>
                <button onclick="resetDay()" id="day-label" class="day-label">Today</button>
                <button onclick="changeDay(1)" class="btn-nav-day">▶</button>
            </div>
            <div id="sched-content" class="space-y-3">
                <div class='text-center text-zinc-500 py-10 font-medium'>Loading Calendar...</div>
            </div>
        </section>

        <section id="tab-news" class="tab-content">
            <div class="flex justify-between items-end mb-4 px-1">
                <h2 class="text-xl font-bold text-white tracking-tight">Top Stories</h2>
            </div>
            <div id="news-content" class="space-y-0">
                <div class='text-center text-zinc-500 py-10 font-medium'>Aggregating global sources...</div>
            </div>
        </section>

        <section id="tab-watch" class="tab-content">
            <div class="flex justify-between items-end mb-4 px-1">
                <h2 class="text-xl font-bold text-white tracking-tight">Latest Videos</h2>
            </div>
            <div id="watch-content" class="space-y-0">
                <div class='text-center text-zinc-500 py-10 font-medium'>Syncing channels...</div>
            </div>
        </section>
    </main>

    <!-- Navigation: Pinned to Bottom -->
    <nav class="flex-none bg-zinc-950/98 backdrop-blur-xl border-t border-zinc-800 flex justify-between px-2 pt-2 pb-safe z-50">
        <button onclick="switchTab('weather', this)" class="nav-btn active">
            <svg viewBox="0 0 24 24"><path d="M17.5 19C19.9853 19 22 16.9853 22 14.5C22 12.1332 20.1818 10.2016 17.8596 10.021C17.4103 6.64333 14.5218 4 11 4C7.13401 4 4 7.13401 4 11C4 11.2374 4.01183 11.472 4.03478 11.7032C2.29828 12.3596 1 14.0253 1 16C1 18.2091 2.79086 20 5 20H17.5Z"/></svg>
            Weather
        </button>
        <button onclick="switchTab('schedule', this)" class="nav-btn">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Schedule
        </button>
        <button onclick="switchTab('news', this)" class="nav-btn">
            <svg viewBox="0 0 24 24"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
            News
        </button>
        <button onclick="switchTab('watch', this)" class="nav-btn">
            <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><polygon points="10 8 16 12 10 16 10 8"/><line x1="8" y1="21" x2="16" y2="21"/></svg>
            Watch
        </button>
    </nav>

    <script>
        // CORE CONFIGURATION
        const CAL_URL = "https://script.google.com/macros/s/AKfycbwDBkCnlyjQQvqYF1WVlwszNyrD6EYNaRpy6LHLACJWjy58cO_qpgJsvvdYrQm3DoiyGQ/exec";
        let currentLoc = 'dg', dayOffset = 0;

        const NEWS_FEEDS = [
            'https://feeds.bbci.co.uk/news/rss.xml',
            'https://www.rte.ie/news/rss/news-headlines.xml',
            'https://www.thejournal.ie/feed/',
            'https://www.theguardian.com/international/rss',
            'https://feeds.cnn.com/rss/edition.rss'
        ];

        // Expanded Channel List combining Tech, Comedy, and Classic Shows
        const WATCH_CHANNELS = [
            { id: 'UC9K540f2b_1N3y0m1l5lO2w', name: 'SNL' },
            { id: 'UCqFzWxSCi39LnW1ZAveBgOA', name: 'Team Coco' },
            { id: 'UCi7GJNg51C3jgmYTUwqoRVw', name: 'SmartLess' },
            { id: 'UC3XTzVzaHQEd30rQbuvCtWQ', name: 'Last Week Tonight' },
            { id: 'UCbZ2GqPqj-7dD7S0Vn8e2kQ', name: 'Daily Show' },
            { id: 'UC8-Th83bH_thdKZDJCrn88g', name: 'Seth Meyers' }, 
            { id: 'UCMtFAi84ehTSYSE9XoHefig', name: 'Stephen Colbert' },
            { id: 'UCa6vGFO9ty8v5KZJXQxdhaw', name: 'Jimmy Kimmel' },
            { id: 'UCxXhS_nQJEDQhWeQ4S1GvLA', name: 'Warner Bros TV' }, // Serves ER / West Wing highlights
            { id: 'UCu2U6x65aC04p-2V675cQ3A', name: 'Off Menu' },
            { id: 'UCMb0O2CdPBNi-QqPk5T3gsQ', name: 'James Hoffmann' },
            { id: 'UCjwpGhw0h5_1oH0R0sioeAw', name: 'Lance Hedrick' },
            { id: 'UC0PEX_z3_18uQzQ511Y2Ogg', name: 'DC Rainmaker' },
            { id: 'UCaXgeReu2G1X7bY1483G2-A', name: 'MKBHD' },
            { id: 'UCa6RRisU52o5-n6S1X9_J3g', name: 'Linus Tech Tips' }
        ];

        function timeAgo(dateString) {
            const date = new Date(dateString);
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " year ago" : " years ago");
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " month ago" : " months ago");
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " day ago" : " days ago");
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " hour ago" : " hours ago");
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + (Math.floor(interval) === 1 ? " min ago" : " mins ago");
            return "Just now";
        }

        function getBrandIdentity(sourceName) {
            const src = sourceName.toLowerCase();
            if (src.includes('cnn')) return 'bg-red-600 text-white';
            if (src.includes('bbc')) return 'bg-yellow-400 text-black';
            if (src.includes('journal')) return 'bg-blue-600 text-white';
            if (src.includes('rté') || src.includes('rte')) return 'bg-emerald-600 text-white';
            if (src.includes('guardian')) return 'bg-blue-900 text-white';
            return 'bg-zinc-700 text-white'; // Default Fallback
        }

        function extractSummary(htmlString) {
            const doc = new DOMParser().parseFromString(htmlString, 'text/html');
            const text = doc.body.textContent || "";
            return text.replace(/\s+/g, ' ').trim().substring(0, 85) + '...';
        }

        function formatTime(isoString) {
            const d = new Date(isoString);
            let h = d.getHours();
            let m = d.getMinutes();
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            m = m < 10 ? '0' + m : m;
            return `${h}:${m} ${ampm}`;
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            btn.classList.add('active');
            
            // Auto scroll to top of main area when switching tabs
            document.querySelector('main').scrollTop = 0;
        }

        async function fetchSched() {
            const date = new Date(); 
            date.setDate(date.getDate() + dayOffset);
            const dStr = date.toISOString().split('T')[0];
            const display = dayOffset === 0 ? "Today" : (dayOffset === 1 ? "Tomorrow" : (dayOffset === -1 ? "Yesterday" : date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric'})));
            
            document.getElementById('day-label').innerText = display;
            const content = document.getElementById('sched-content');
            
            content.innerHTML = "<div class='text-center text-zinc-500 py-10 animate-pulse'>Syncing Calendar...</div>";
            document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.5)]";

            try {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), 8000);
                const res = await fetch(`${CAL_URL}?date=${dStr}`, { signal: controller.signal });
                const data = await res.json();
                clearTimeout(id);
                
                if(data.status === "error") throw new Error(data.message);
                
                if(data.events && data.events.length > 0) {
                    content.innerHTML = data.events.map(e => `
                        <div class='item-card'>
                            <div class="flex-1">
                                <p class='font-bold text-[17px] text-white leading-snug'>${e.title}</p>
                                <p class='text-sm text-zinc-400 mt-1.5 font-medium flex items-center gap-2'>
                                    <span class="bg-zinc-800 text-accent px-2 py-0.5 rounded text-xs tracking-wide">${e.time}</span>
                                    <span>${e.calendarName}</span>
                                </p>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]";
                } else {
                    content.innerHTML = `<div class='text-center py-20 text-zinc-500 text-lg'>No events scheduled for ${display.toLowerCase()}.</div>`;
                    document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]";
                }
            } catch(e) { 
                content.innerHTML = "<div class='text-center py-10 text-red-500 font-medium bg-red-950/30 rounded-xl border border-red-900/50 p-4'>Calendar Sync Error. Check Scripts or Network.</div>"; 
                document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]";
            }
        }

        function changeDay(delta) { dayOffset += delta; fetchSched(); }
        function resetDay() { dayOffset = 0; fetchSched(); }

        function setLoc(loc) {
            currentLoc = loc;
            document.getElementById('btn-dg').className = loc === 'dg' ? 'flex-1 py-3 rounded-xl font-bold text-sm bg-zinc-800 text-white transition-all shadow-sm' : 'flex-1 py-3 rounded-xl font-bold text-sm text-zinc-500 transition-all';
            document.getElementById('btn-sp').className = loc === 'sp' ? 'flex-1 py-3 rounded-xl font-bold text-sm bg-zinc-800 text-white transition-all shadow-sm' : 'flex-1 py-3 rounded-xl font-bold text-sm text-zinc-500 transition-all';
            loadWeather();
        }

        function getWeatherSynopsis(code) {
            if (code <= 1) return "Bright and clear skies today.";
            if (code <= 3) return "Sunny spells mixed with partial cloud cover.";
            if (code <= 48) return "Foggy conditions reducing visibility.";
            if (code <= 55) return "Light drizzle expected throughout the day.";
            if (code <= 65) return "Steady rain. Keep an umbrella handy.";
            if (code <= 77) return "Snow showers likely in certain areas.";
            if (code <= 82) return "Heavy rain showers moving through.";
            return "Stormy and unsettled conditions.";
        }

        function renderTideGraph(isDG) {
            const width = 1000;
            const height = 140;
            let pathD = `M 0 ${height} `;
            
            // Dramatic amplitude to make the waves look tall and impactful
            const amp = isDG ? 55 : 65; 
            const offset = isDG ? 0 : Math.PI; 

            for (let i = 0; i <= width; i += 10) {
                const x = i;
                const y = (height / 2) + amp * Math.sin((i / width) * Math.PI * 2 + offset);
                pathD += `L ${x} ${y} `;
            }
            pathD += `L ${width} ${height} Z`;

            const highText = isDG ? 'High: 14:30' : 'High: 15:10';
            const lowText = isDG ? 'Low: 20:15' : 'Low: 21:00';

            document.getElementById('tide-graph-wrapper').innerHTML = `
                <svg viewBox="0 0 1000 140" class="w-full h-full rounded-xl overflow-hidden bg-[#0f0f13] border border-zinc-800/50">
                    <path class="tide-wave" d="${pathD}" />
                    <!-- Visual marker for current approximate time (mocked center) -->
                    <circle cx="500" cy="${(height / 2) + amp * Math.sin(Math.PI + offset)}" r="8" class="tide-point" stroke="rgba(139, 92, 246, 0.5)" stroke-width="4"/>
                </svg>
            `;
            document.getElementById('tide-text').innerHTML = `<span class="mr-3">▼ ${lowText}</span><span>▲ ${highText}</span>`;
        }

        async function loadWeather() {
            const lat = currentLoc === 'dg' ? 53.28 : 52.85;
            const lon = currentLoc === 'dg' ? -6.15 : -9.53;
            try {
                // Fetch daily extremes, current temp, weather code, and sunrise/sunset
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode,sunrise,sunset&current=temperature_2m,weathercode&timezone=auto`);
                const data = await res.json();
                
                const synopsis = getWeatherSynopsis(data.daily.weathercode[0] || data.current.weathercode);
                const riseTime = formatTime(data.daily.sunrise[0]);
                const setTime = formatTime(data.daily.sunset[0]);
                
                document.getElementById('w-temp-box').innerHTML = `
                    <div class='text-6xl font-black text-white tracking-tighter'>${Math.round(data.current.temperature_2m)}°</div>
                    <div class='text-xs font-bold text-zinc-400 mt-2 tracking-wide'>H: ${Math.round(data.daily.temperature_2m_max[0])}° &nbsp; L: ${Math.round(data.daily.temperature_2m_min[0])}°</div>
                `;
                
                document.getElementById('w-desc-box').innerHTML = `
                    <div class='text-sm font-medium text-accent leading-snug mb-3'>${synopsis}</div>
                    <div class='flex flex-col gap-2 text-xs text-zinc-400 font-semibold tracking-wide'>
                        <div class='flex items-center gap-2'>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83M12 16a4 4 0 100-8 4 4 0 000 8z"/></svg>
                            ${riseTime}
                        </div>
                        <div class='flex items-center gap-2'>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83M12 16a4 4 0 100-8 4 4 0 000 8z"/></svg>
                            ${setTime}
                        </div>
                    </div>
                `;
                renderTideGraph(currentLoc === 'dg');
            } catch(e) { 
                document.getElementById('w-temp-box').innerHTML = "<div class='text-red-500 py-4 text-sm'>Error loading weather.</div>"; 
            }
        }

        async function loadNews() {
            const newsEl = document.getElementById('news-content');
            
            try {
                const fetchWithTimeout = (url, timeout = 5000) => Promise.race([
                    fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`).then(r => r.json()),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), timeout))
                ]);

                const results = await Promise.allSettled(NEWS_FEEDS.map(f => fetchWithTimeout(f)));
                
                // Aggregate everything BEFORE sorting
                const all = results
                    .filter(r => r.status === 'fulfilled' && r.value.items)
                    .flatMap(r => {
                        return r.value.items.map(item => ({
                            ...item,
                            feedTitle: r.value.feed?.title || item.source || 'News'
                        }));
                    })
                    .sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate)); // Global recency sort
                
                if(all.length === 0) throw new Error();
                
                newsEl.innerHTML = all.slice(0, 35).map(i => {
                    const src = i.feedTitle;
                    const brandClasses = getBrandIdentity(src);
                    const letter = src.charAt(0).toUpperCase();
                    const timeStr = timeAgo(i.pubDate);
                    
                    return `
                        <div class='item-card'>
                            <div class="news-brand-badge ${brandClasses}">${letter}</div>
                            <div class="flex-1 overflow-hidden">
                                <p class='font-bold text-[15px] text-white leading-snug'>${i.title}</p>
                                <p class='text-[11px] text-zinc-400 mt-2 font-bold uppercase tracking-wider'>
                                    ${src} <span class="mx-1 text-zinc-600">•</span> <span class="text-zinc-500">${timeStr}</span>
                                </p>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch(e) { 
                newsEl.innerHTML = "<div class='text-center py-10 text-zinc-500'>News feed unavailable.</div>"; 
            }
        }

        async function loadWatch() {
            const watchEl = document.getElementById('watch-content');
            
            try {
                const fetchChan = async (ch) => {
                    try {
                        // We use a try-catch inside the map so one broken feed doesn't crash Promise.all
                        const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${ch.id}`);
                        const data = await res.json();
                        return (data.items || []).map(v => ({ ...v, author: ch.name }));
                    } catch(e) {
                        return [];
                    }
                };

                // Fetch all channels simultaneously
                const results = await Promise.allSettled(WATCH_CHANNELS.map(ch => fetchChan(ch)));
                
                // Aggregate all successfully fetched videos BEFORE sorting
                const videos = results
                    .filter(r => r.status === 'fulfilled')
                    .flatMap(r => r.value)
                    .sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate)); // Global recency sort
                
                if(videos.length === 0) throw new Error();
                
                watchEl.innerHTML = videos.slice(0, 40).map(v => {
                    const timeStr = timeAgo(v.pubDate);
                    const summary = extractSummary(v.description);
                    
                    return `
                    <div class='video-item'>
                        <img src='${v.thumbnail}' class='video-thumb' onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%2275%22><rect width=%22120%22 height=%2275%22 fill=%22%2327272a%22/></svg>'">
                        <div class="flex-1 overflow-hidden">
                            <p class='font-bold text-[14px] text-white leading-tight mb-1'>${v.title}</p>
                            <p class='text-[10px] text-zinc-400 font-bold uppercase tracking-wider mb-1'>
                                ${v.author} <span class="mx-1 text-zinc-600">•</span> <span class="text-zinc-500">${timeStr}</span>
                            </p>
                            <p class='text-[12px] text-zinc-500 line-clamp-2 leading-snug'>${summary}</p>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) { 
                watchEl.innerHTML = "<div class='text-center py-10 text-red-500'>Video sync failed. Please refresh.</div>"; 
            }
        }

        function init() {
            document.getElementById('date-display').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            fetchSched(); 
            loadWeather(); 
            loadNews(); 
            loadWatch();
        }
        
        init();
    </script>
</body>
</html>
