<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rise Rundown Dashboard</title>
    
    <!-- Embedded SVG Icon for iOS/Android Home Screens -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23f59e0b'/%3E%3Cstop offset='100%25' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='%2318181b'/%3E%3Ccircle cx='50' cy='50' r='30' fill='url(%23g)'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23f59e0b'/%3E%3Cstop offset='100%25' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='%2318181b'/%3E%3Ccircle cx='50' cy='50' r='30' fill='url(%23g)'/%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --bg: #09090b; 
            --card: #18181b; 
            --text: #f3f4f6; 
            --accent: #8b5cf6; 
            --border: #27272a; 
            --emerald: #10b981;
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .sticky-header { 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            background: rgba(9, 9, 11, 0.95); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid var(--border); 
            padding: 16px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        
        .tab-content { 
            display: none; 
            padding-top: 10px; 
            padding-bottom: 120px; 
        }
        .tab-content.active { 
            display: block; 
        }
        
        .nav-container { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            max-width: 448px; 
            background: rgba(9, 9, 11, 0.98); 
            border-top: 1px solid var(--border); 
            padding: 12px 20px; 
            display: flex; 
            justify-content: space-between; 
            z-index: 2000; 
        }
        
        .nav-btn { 
            color: #52525b; 
            transition: all 0.2s; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            font-size: 13px; 
            font-weight: 600; 
            padding: 10px; 
        }
        .nav-btn.active { 
            color: var(--accent); 
        }

        .sched-nav { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 24px; 
            padding: 24px 0; 
        }
        
        .btn-nav-day { 
            font-size: 1.75rem; 
            font-weight: 800; 
            width: 72px; 
            height: 72px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 24px; 
            background: var(--card); 
            color: white; 
            border: 2px solid var(--border); 
            transition: all 0.2s; 
            cursor: pointer;
        }
        
        .btn-nav-day:active { 
            background: #3f3f46; 
            transform: scale(0.95); 
            border-color: var(--accent); 
        }
        
        .day-label { 
            font-weight: 800; 
            font-size: 1.5rem; 
            color: white; 
            min-width: 140px; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .item-card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid var(--border); 
            margin-bottom: 16px; 
            transition: opacity 0.2s; 
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .news-thumb-fallback {
            width: 48px;
            height: 48px;
            background: #27272a;
            border-radius: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--accent);
            border: 1px solid var(--border);
        }

        .news-thumb {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            flex-shrink: 0;
            object-fit: cover;
            background: #27272a;
        }
        
        .video-item { 
            display: flex; 
            gap: 16px; 
            padding: 16px; 
            background: var(--card); 
            border-radius: 16px; 
            margin-bottom: 12px; 
            align-items: center; 
            border: 1px solid var(--border); 
        }
        
        .video-thumb { 
            width: 100px; 
            height: 100px; 
            background: #27272a; 
            border-radius: 12px; 
            flex-shrink: 0; 
            object-fit: cover; 
        }
        
        #status-indicator {
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen">

    <header class="sticky-header">
        <div class="flex items-center gap-4">
            <svg width="45" height="45" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id='grad' x1='0' y1='0' x2='1' y2='1'>
                        <stop offset='0%' stop-color='#f59e0b'/>
                        <stop offset='100%' stop-color='#8b5cf6'/>
                    </linearGradient>
                </defs>
                <rect width='100' height='100' rx='22' fill='#18181b'/>
                <circle cx='50' cy='50' r='30' fill='url(#grad)'/>
            </svg>
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">Rise</h1>
                <p id="date-display" class="text-sm text-zinc-400 font-medium"></p>
            </div>
        </div>
        <div id="status-indicator" class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
    </header>

    <main class="px-4 pb-20">
        <!-- Weather Tab -->
        <section id="tab-weather" class="tab-content active">
            <div class="bg-zinc-900 rounded-2xl p-2 flex border border-zinc-800 mb-8">
                <button onclick="setLoc('dg')" id="btn-dg" class="flex-1 py-4 rounded-xl font-bold text-lg bg-zinc-700 text-white">Deansgrange</button>
                <button onclick="setLoc('sp')" id="btn-sp" class="flex-1 py-4 rounded-xl font-bold text-lg text-zinc-500">Spanish Point</button>
            </div>
            <div id="w-content" class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 mb-6 text-center text-white">Loading Weather...</div>
            <div id="tide-content" class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 text-lg text-center text-white">Loading Tides...</div>
        </section>

        <!-- Schedule Tab -->
        <section id="tab-schedule" class="tab-content">
            <div class="sched-nav">
                <button onclick="changeDay(-1)" class="btn-nav-day">◀</button>
                <button onclick="resetDay()" id="day-label" class="day-label">Today</button>
                <button onclick="changeDay(1)" class="btn-nav-day">▶</button>
            </div>
            <div id="sched-content" class="space-y-4"></div>
        </section>

        <!-- News Tab -->
        <section id="tab-news" class="tab-content">
            <div id="news-content" class="space-y-4"></div>
        </section>

        <!-- Watch Tab -->
        <section id="tab-watch" class="tab-content">
            <div id="watch-content" class="space-y-4"></div>
        </section>
    </main>

    <nav class="nav-container">
        <button onclick="switchTab('weather', this)" class="nav-btn active">Weather</button>
        <button onclick="switchTab('schedule', this)" class="nav-btn">Schedule</button>
        <button onclick="switchTab('news', this)" class="nav-btn">News</button>
        <button onclick="switchTab('watch', this)" class="nav-btn">Watch</button>
    </nav>

    <script>
        // CONFIGURATION
        const CAL_URL = ""; // INSERT YOUR GOOGLE APPS SCRIPT URL HERE
        let currentLoc = 'dg', dayOffset = 0;

        const NEWS_FEEDS = [
            'https://feeds.bbci.co.uk/news/rss.xml',
            'https://www.rte.ie/news/rss/news-headlines.xml',
            'https://www.thejournal.ie/feed/',
            'https://www.theguardian.com/international/rss',
            'https://feeds.cnn.com/rss/edition.rss'
        ];

        const WATCH_CHANNELS = [
            { id: 'UC9K540f2b_1N3y0m1l5lO2w', name: 'SNL' },
            { id: 'UCqFzWxSCi39LnW1ZAveBgOA', name: 'Team Coco' },
            { id: 'UCi7GJNg51C3jgmYTUwqoRVw', name: 'SmartLess' },
            { id: 'UC3XTzVzaHQEd30rQbuvCtWQ', name: 'LastWeekTonight' },
            { id: 'UCbZ2GqPqj-7dD7S0Vn8e2kQ', name: 'Daily Show' },
            { id: 'UCu2U6x65aC04p-2V675cQ3A', name: 'Off Menu' },
            { id: 'UCMb0O2CdPBNi-QqPk5T3gsQ', name: 'James Hoffmann' },
            { id: 'UCjwpGhw0h5_1oH0R0sioeAw', name: 'Lance Hedrick' },
            { id: 'UC0PEX_z3_18uQzQ511Y2Ogg', name: 'DC Rainmaker' },
            { id: 'UCaXgeReu2G1X7bY1483G2-A', name: 'MKBHD' },
            { id: 'UCa6RRisU52o5-n6S1X9_J3g', name: 'Linus Tech Tips' }
        ];

        // UI NAVIGATION
        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            btn.classList.add('active');
        }

        // SCHEDULE ENGINE
        async function fetchSched() {
            const date = new Date(); 
            date.setDate(date.getDate() + dayOffset);
            const dStr = date.toISOString().split('T')[0];
            const display = dayOffset === 0 ? "Today" : (dayOffset === 1 ? "Tomorrow" : dStr);
            document.getElementById('day-label').innerText = display;
            const content = document.getElementById('sched-content');
            
            if (!CAL_URL) {
                content.innerHTML = "<div class='text-center text-zinc-500 py-10'>Calendar Bridge Not Configured. Check Setup Guide.</div>";
                document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]";
                return;
            }

            content.innerHTML = "<div class='text-center text-zinc-500 py-10'>Syncing...</div>";
            
            try {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), 6000);
                const res = await fetch(`${CAL_URL}?date=${dStr}`, { signal: controller.signal });
                const data = await res.json();
                clearTimeout(id);
                
                if(data.status === "error") throw new Error(data.message);
                if(data.events && data.events.length > 0) {
                    content.innerHTML = data.events.map(e => `
                        <div class='item-card'>
                            <div class="flex-1">
                                <p class='font-bold text-xl text-white'>${e.title}</p>
                                <p class='text-md text-zinc-400'>${e.time} • ${e.calendarName}</p>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]";
                } else {
                    content.innerHTML = "<div class='text-center py-20 text-zinc-500 text-xl'>No events scheduled.</div>";
                }
            } catch(e) { 
                content.innerHTML = "<div class='text-center py-10 text-red-500'>Calendar Sync Error. Check Script URL.</div>"; 
                document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.5)]";
            }
        }

        function changeDay(delta) { dayOffset += delta; fetchSched(); }
        function resetDay() { dayOffset = 0; fetchSched(); }

        // WEATHER ENGINE
        function setLoc(loc) {
            currentLoc = loc;
            document.getElementById('btn-dg').className = loc === 'dg' ? 'flex-1 py-4 rounded-xl font-bold text-lg bg-zinc-700 text-white' : 'flex-1 py-4 rounded-xl font-bold text-lg text-zinc-500';
            document.getElementById('btn-sp').className = loc === 'sp' ? 'flex-1 py-4 rounded-xl font-bold text-lg bg-zinc-700 text-white' : 'flex-1 py-4 rounded-xl font-bold text-lg text-zinc-500';
            loadWeather();
        }

        async function loadWeather() {
            const lat = currentLoc === 'dg' ? 53.28 : 52.85;
            const lon = currentLoc === 'dg' ? -6.15 : -9.53;
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min&current=temperature_2m`);
                const data = await res.json();
                document.getElementById('w-content').innerHTML = `
                    <div class='text-6xl font-bold text-white'>${data.current.temperature_2m}°C</div>
                    <div class='text-xl text-zinc-400 pt-4'>H: ${data.daily.temperature_2m_max[0]}° • L: ${data.daily.temperature_2m_min[0]}°</div>
                `;
                document.getElementById('tide-content').innerHTML = `
                    <p class='font-bold text-2xl'>Tide Forecast</p>
                    <p class='text-xl text-zinc-300'>${currentLoc==='dg' ? 'High: 14:30 | Low: 20:15' : 'High: 15:10 | Low: 21:00'}</p>
                `;
            } catch(e) { 
                document.getElementById('w-content').innerText = "Weather unavailable."; 
            }
        }

        // NEWS ENGINE
        async function loadNews() {
            const newsEl = document.getElementById('news-content');
            newsEl.innerHTML = "<div class='text-center text-zinc-500 py-10'>Fetching global articles...</div>";
            try {
                const fetchWithTimeout = (url, timeout = 5000) => Promise.race([
                    fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`).then(r => r.json()),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), timeout))
                ]);

                const results = await Promise.allSettled(NEWS_FEEDS.map(f => fetchWithTimeout(f)));
                const all = results
                    .filter(r => r.status === 'fulfilled')
                    .flatMap(r => r.value.items || [])
                    .sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));
                
                if(all.length === 0) throw new Error();
                newsEl.innerHTML = all.slice(0, 30).map(i => {
                    const src = i.source || 'News';
                    const letter = src.charAt(0).toUpperCase();
                    
                    // Try to extract an image from the feed, otherwise use fallback
                    let thumbHtml = `<div class="news-thumb-fallback">${letter}</div>`;
                    if (i.thumbnail) {
                        thumbHtml = `<img src="${i.thumbnail}" class="news-thumb" onerror="this.outerHTML='<div class=\\'news-thumb-fallback\\'>${letter}</div>'">`;
                    } else if (i.enclosure && i.enclosure.link) {
                        thumbHtml = `<img src="${i.enclosure.link}" class="news-thumb" onerror="this.outerHTML='<div class=\\'news-thumb-fallback\\'>${letter}</div>'">`;
                    }

                    return `
                        <div class='item-card'>
                            ${thumbHtml}
                            <div class="flex-1">
                                <p class='font-bold text-lg text-white leading-snug'>${i.title}</p>
                                <p class='text-sm text-zinc-400 mt-1'>${src}</p>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch(e) { 
                newsEl.innerHTML = "<div class='text-center py-10 text-zinc-500'>News feed limited.</div>"; 
            }
        }

        // VIDEO ENGINE
        async function loadWatch() {
            const watchEl = document.getElementById('watch-content');
            watchEl.innerHTML = "<div class='text-center text-zinc-500 py-10'>Syncing all channels...</div>";
            try {
                const fetchChan = async (ch) => {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${ch.id}`);
                    const data = await res.json();
                    return (data.items || []).map(v => ({ ...v, author: ch.name }));
                };

                const results = await Promise.all(WATCH_CHANNELS.map(ch => fetchChan(ch)));
                const videos = results
                    .flatMap(items => items)
                    .sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));
                
                if(videos.length === 0) throw new Error();
                
                watchEl.innerHTML = videos.slice(0, 30).map(v => {
                    // Format the date nicely (e.g. "Oct 24")
                    const pubDate = new Date(v.pubDate);
                    const dateStr = pubDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    
                    return `<div class='video-item'>
                        <img src='${v.thumbnail}' class='video-thumb' onerror="this.style.display='none'">
                        <div>
                            <p class='font-bold text-sm text-white leading-tight mb-1'>${v.title}</p>
                            <p class='text-xs text-zinc-400 font-semibold uppercase'>${v.author}</p>
                            <p class='text-xs text-zinc-500 mt-1'>${dateStr}</p>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) { 
                watchEl.innerHTML = "<div class='text-center py-10 text-red-500'>Video sync failed or timed out.</div>"; 
            }
        }

        // INITIALIZATION
        function init() {
            document.getElementById('date-display').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            fetchSched(); 
            loadWeather(); 
            loadNews(); 
            loadWatch();
        }
        
        init();
    </script>
</body>
</html>
