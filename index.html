<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rise Rundown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        (function(){
            const cvs = document.createElement('canvas');
            cvs.width = 180; cvs.height = 180;
            const ctx = cvs.getContext('2d');
            ctx.fillStyle = '#09090b'; 
            ctx.beginPath(); ctx.roundRect(0, 0, 180, 180, 40); ctx.fill();
            const grad = ctx.createLinearGradient(0, 0, 180, 180);
            grad.addColorStop(0, '#f59e0b'); grad.addColorStop(1, '#8b5cf6');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(90, 90, 54, 0, Math.PI * 2); ctx.fill();
            const link = document.createElement('link');
            link.rel = 'apple-touch-icon';
            link.href = cvs.toDataURL('image/png');
            document.head.appendChild(link);
        })();
    </script>

    <style>
        :root { 
            --bg: #09090b; 
            --card: #18181b; 
            --text: #f3f4f6; 
            --accent: #8b5cf6; 
            --border: #27272a; 
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .app-container { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        .tab-content { display: none; padding-bottom: 24px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .brand-cnn { background-color: #dc2626; color: white; }
        .brand-bbc { background-color: #facc15; color: black; }
        .brand-rte { background-color: #0ea5e9; color: white; } 
        .brand-journal { background-color: #1e3a8a; color: white; }
        .brand-guardian { background-color: #1e40af; color: white; }
        .brand-default { background-color: #3f3f46; color: white; }
        
        .nav-btn { color: #52525b; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 12px 8px; }
        .nav-btn svg { stroke: currentColor; fill: none; stroke-width: 2; width: 24px; height: 24px; }
        .nav-btn.active { color: var(--accent); }
        
        .tide-wave { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>

<body class="app-container max-w-md mx-auto bg-zinc-950 shadow-2xl shadow-black relative">

    <header class="flex-none bg-zinc-950/95 backdrop-blur-md border-b border-zinc-800 p-4 px-5 flex items-center justify-between z-50">
        <div class="flex items-center gap-3">
            <svg width="40" height="40" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id='gradHead' x1='0' y1='0' x2='1' y2='1'>
                        <stop offset='0%' stop-color='#f59e0b'/>
                        <stop offset='100%' stop-color='#8b5cf6'/>
                    </linearGradient>
                </defs>
                <rect width='100' height='100' rx='22' fill='#18181b'/>
                <circle cx='50' cy='50' r='30' fill='url(#gradHead)'/>
            </svg>
            <div>
                <h1 class="text-xl font-bold text-white tracking-tight leading-none">Rise</h1>
                <p id="date-display" class="text-[11px] text-zinc-400 font-bold uppercase tracking-wider mt-1"></p>
            </div>
        </div>
        <div id="status-indicator" class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)] transition-colors duration-300"></div>
    </header>

    <main class="flex-1 overflow-y-auto overflow-x-hidden hide-scrollbar px-4 pt-4 relative">
        
        <section id="tab-weather" class="tab-content active h-full space-y-6">
            <div class="bg-zinc-900 rounded-2xl p-1.5 flex border border-zinc-800 shrink-0">
                <button onclick="setLoc('dg')" id="btn-dg" class="flex-1 py-3 rounded-xl font-bold text-sm transition-colors">Deansgrange</button>
                <button onclick="setLoc('sp')" id="btn-sp" class="flex-1 py-3 rounded-xl font-bold text-sm transition-colors">Spanish Point</button>
            </div>
            
            <div class="bg-zinc-900 rounded-3xl p-5 border border-zinc-800 shadow-xl shrink-0">

                    </div>
                    <div id="w-desc-box" class="pl-2 flex flex-col justify-center">

            <div id="tide-content" class="bg-zinc-900 p-5 rounded-3xl border border-zinc-800 shadow-xl shrink-0">

                    <p class='font-bold text-xl text-white'>Tides</p>
                    <div class="text-right">
                        <div id="tide-high-text" class="text-sm font-bold text-blue-400"></div>

                    </div>
                </div>
                
                <div id="tide-graph-wrapper" class="w-full h-[180px] relative rounded-xl overflow-hidden mb-1">
                    <!-- SVG injected via JS -->
                </div>
                
                <div class="flex justify-between text-[10px] font-bold text-zinc-500 px-2 uppercase tracking-wider">
                    <span>00:00</span>
                    <span>06:00</span>
                    <span>12:00</span>
                    <span>18:00</span>
                    <span>00:00</span>

            </div>
        </section>

        <section id="tab-schedule" class="tab-content">
            <div class="flex items-center justify-between gap-4 py-4 mb-2">
                <button onclick="changeDay(-1)" class="w-14 h-14 bg-zinc-900 rounded-2xl flex items-center justify-center font-bold text-xl border border-zinc-800 hover:bg-zinc-800 active:scale-95 transition-all text-zinc-400">◀</button>
                <button onclick="resetDay()" id="day-label" class="flex-1 h-14 bg-zinc-900 rounded-2xl flex items-center justify-center font-extrabold text-lg uppercase tracking-wide border border-zinc-800 hover:bg-zinc-800 active:scale-95 transition-all text-white">Today</button>
                <button onclick="changeDay(1)" class="w-14 h-14 bg-zinc-900 rounded-2xl flex items-center justify-center font-bold text-xl border border-zinc-800 hover:bg-zinc-800 active:scale-95 transition-all text-zinc-400">▶</button>
            </div>
            <div id="sched-content" class="space-y-3 pb-8">

            </div>
        </section>

        <section id="tab-news" class="tab-content">

            </div>
        </section>

        <section id="tab-watch" class="tab-content">

            <div id="watch-content" class="space-y-4 pb-8">

            </div>
        </section>
    </main>

        <button onclick="switchTab('weather', this)" class="nav-btn active">
            <svg viewBox="0 0 24 24"><path d="M17.5 19C19.9853 19 22 16.9853 22 14.5C22 12.1332 20.1818 10.2016 17.8596 10.021C17.4103 6.64333 14.5218 4 11 4C7.13401 4 4 7.13401 4 11C4 11.2374 4.01183 11.472 4.03478 11.7032C2.29828 12.3596 1 14.0253 1 16C1 18.2091 2.79086 20 5 20H17.5Z"/></svg>
            Weather

            Schedule
        </button>
        <button onclick="switchTab('news', this)" class="nav-btn">
            <svg viewBox="0 0 24 24"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
            News
        </button>
        <button onclick="switchTab('watch', this)" class="nav-btn">
            <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><polygon points="10 8 16 12 10 16 10 8"/><line x1="8" y1="21" x2="16" y2="21"/></svg>
            Watch

    </nav>

    <script>
        const CAL_URL = "https://script.google.com/macros/s/AKfycbwDBkCnlyjQQvqYF1WVlwszNyrD6EYNaRpy6LHLACJWjy58cO_qpgJsvvdYrQm3DoiyGQ/exec";
        let currentLoc = localStorage.getItem('riseLoc') || 'dg';
        let dayOffset = 0;

        const NEWS_FEEDS = [
            'https://feeds.bbci.co.uk/news/rss.xml',
            'https://www.rte.ie/news/rss/news-headlines.xml',
            'https://www.thejournal.ie/feed/',
            'https://www.theguardian.com/international/rss',
            'http://rss.cnn.com/rss/edition.rss'
        ];

        const WATCH_CHANNELS = [
            // Comedy / Late Night
            { id: 'UC9K540f2b_1N3y0m1l5lO2w', name: 'SNL' },
            { id: 'UCqFzWxSCi39LnW1ZAveBgOA', name: 'Team Coco' },
            { id: 'UC0hQpeHKPEAAMY4pYgYk-fA', name: 'Letterman' },
            { id: 'UCi7GJNg51C3jgmYTUwqoRVw', name: 'SmartLess' },
            { id: 'UC3XTzVzaHQEd30rQbuvCtWQ', name: 'Last Week Tonight' },
            { id: 'UCbZ2GqPqj-7dD7S0Vn8e2kQ', name: 'Daily Show' },
            { id: 'UC8-Th83bH_thdKZDJCrn88g', name: 'Seth Meyers' },
            { id: 'UCMtFAi84ehTSYSE9XoHefig', name: 'Stephen Colbert' },
            { id: 'UCa6vGFO9ty8v5KZJXQxdhaw', name: 'Jimmy Kimmel' },
            { id: 'UCu2U6x65aC04p-2V675cQ3A', name: 'Off Menu' },
            
            // Tech / Niche
            { id: 'UCMb0O2CdPBNi-QqPk5T3gsQ', name: 'James Hoffmann' },
            { id: 'UCjwpGhw0h5_1oH0R0sioeAw', name: 'Lance Hedrick' },
            { id: 'UC0PEX_z3_18uQzQ511Y2Ogg', name: 'DC Rainmaker' },
            { id: 'UCaXgeReu2G1X7bY1483G2-A', name: 'MKBHD' },
            { id: 'UCa6RRisU52o5-n6S1X9_J3g', name: 'Linus Tech Tips' },
            { id: 'UC70xQo3a74aH4jE6qV2s0tA', name: 'TED' },
            
            // News / Finance / Sports
            { id: 'UCupvZgA3wgS_Pazpt52iNdg', name: 'Sky News' },
            { id: 'UCDiC215i-0C4M97W483k0bA', name: 'CNN' },
            { id: 'UC4x3eJtU22lX8_9M-2C626g', name: 'BBC News' },
            { id: 'UC_I_J8D7B2-BvIOMu1o5t3Q', name: 'RTÉ News' },
            { id: 'UClzRmAESZrgQ-I-kCM6R4-Q', name: 'Vox' },
            { id: 'UCn8zNIfYAQNdrFRrr8oibKw', name: 'Vice' },
            { id: 'UCcgqMZvAkyA-EaaZvu2n0ng', name: 'Bloomberg' },
            { id: 'UCK7tptYoggEXpdOwRGUbmVA', name: 'WSJ' },
            { id: 'UCvQECJukTDE2i6aCoMnS-Vg', name: 'Financial Times' },
            { id: 'UC7jF7F_rA2J4xK6Eij92Htw', name: 'BBC Sport' }
        ];

        function timeAgo(dateString) {
            const date = new Date(dateString);
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = Math.floor(seconds / 31536000);
            if (interval >= 1) return interval === 1 ? "1 year ago" : `${interval} years ago`;
            interval = Math.floor(seconds / 2592000);
            if (interval >= 1) return interval === 1 ? "1 month ago" : `${interval} months ago`;
            interval = Math.floor(seconds / 86400);
            if (interval >= 1) return interval === 1 ? "1 day ago" : `${interval} days ago`;
            interval = Math.floor(seconds / 3600);
            if (interval >= 1) return interval === 1 ? "1 hour ago" : `${interval} hours ago`;
            interval = Math.floor(seconds / 60);
            if (interval >= 1) return interval === 1 ? "1 min ago" : `${interval} mins ago`;
            return "Just now";
        }

        function extractSummary(htmlString) {
            const doc = new DOMParser().parseFromString(htmlString, 'text/html');
            return (doc.body.textContent || "").replace(/\s+/g, ' ').trim().substring(0, 95) + '...';
        }

        function formatTime(isoString) {
            if (!isoString) return "--:--";
            const d = new Date(isoString);
            let h = d.getHours();
            let m = d.getMinutes();
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            m = m < 10 ? '0' + m : m;
            return `${h}:${m} ${ampm}`;
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            btn.classList.add('active');
        }

        async function fetchSched() {
            const date = new Date(); 
            date.setDate(date.getDate() + dayOffset);
            const dStr = date.toISOString().split('T')[0];
            
            let display;
            if (dayOffset === 0) display = "Today";
            else if (dayOffset === 1) display = "Tomorrow";
            else if (dayOffset === -1) display = "Yesterday";
            else display = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric'});
            
            document.getElementById('day-label').innerText = display;
            const content = document.getElementById('sched-content');
            
            content.innerHTML = "<div class='text-center text-zinc-500 py-10 animate-pulse font-medium'>Syncing Calendar...</div>";
            document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.5)]";

            try {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), 8000);
                const res = await fetch(`${CAL_URL}?date=${dStr}`, { signal: controller.signal });
                const data = await res.json();
                clearTimeout(id);
                
                if(data.status === "error") throw new Error(data.message);
                
                if(data.events && data.events.length > 0) {
                    content.innerHTML = data.events.map(e => `
                        <div class='bg-zinc-900 p-5 rounded-2xl border border-zinc-800 shadow-sm flex items-start gap-4'>
                            <div class="flex-1">
                                <p class='font-bold text-[17px] text-white leading-snug'>${e.title}</p>
                                <p class='text-sm text-zinc-400 mt-2 font-medium flex items-center gap-2'>
                                    <span class="bg-zinc-800 text-accent px-2 py-0.5 rounded text-xs tracking-wide">${e.time}</span>
                                    <span>${e.calendarName}</span>
                                </p>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]";
                } else {
                    content.innerHTML = `<div class='text-center py-20 text-zinc-500 text-lg'>No events scheduled for ${display.toLowerCase()}.</div>`;
                    document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]";
                }
            } catch(e) { 
                content.innerHTML = "<div class='text-center py-10 text-red-500 font-medium bg-red-950/30 rounded-xl border border-red-900/50 p-4'>Calendar Sync Error. Check Scripts or Network.</div>"; 
                document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]";
            }
        }

        function changeDay(delta) { dayOffset += delta; fetchSched(); }
        function resetDay() { dayOffset = 0; fetchSched(); }
        
        function setLoc(loc) {
            currentLoc = loc;
            localStorage.setItem('riseLoc', loc);
            document.getElementById('btn-dg').className = loc === 'dg' ? 'flex-1 py-3 rounded-xl font-bold text-sm bg-zinc-800 text-white shadow-sm transition-colors' : 'flex-1 py-3 rounded-xl font-bold text-sm text-zinc-500 transition-colors';
            document.getElementById('btn-sp').className = loc === 'sp' ? 'flex-1 py-3 rounded-xl font-bold text-sm bg-zinc-800 text-white shadow-sm transition-colors' : 'flex-1 py-3 rounded-xl font-bold text-sm text-zinc-500 transition-colors';
            loadWeather();
        }

        function getForecastProse(code, temp) {
            let base = "";
            if (code <= 1) base = "Expect bright, clear skies with extensive sunny spells throughout the day.";
            else if (code <= 3) base = "A mix of cloud cover and sunshine, remaining largely dry today.";
            else if (code <= 48) base = "Starting with dense fog and low visibility, clearing slowly as the day progresses.";
            else if (code <= 67) base = "Overcast conditions prevailing with intermittent periods of light rain or drizzle.";
            else if (code <= 77) base = "Cold conditions bringing a likelihood of snow showers or sleet.";
            else base = "Unsettled weather expected with heavy rain and potential storm conditions.";
            
            let tempContext = "";
            if (temp < 10) tempContext = " Wrap up warm as temperatures will feel quite chilly.";
            else if (temp >= 20) tempContext = " A genuinely warm day, perfect for outdoor activities.";
            
            return base + tempContext;
        }

        async function loadWeather() {
            const lat = currentLoc === 'dg' ? 53.28 : 52.85;
            const lon = currentLoc === 'dg' ? -6.15 : -9.53;
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode,sunrise,sunset&current=temperature_2m,weathercode&timezone=auto`);
                const data = await res.json();
                
                const riseTime = formatTime(data.daily.sunrise[0]);
                const setTime = formatTime(data.daily.sunset[0]);
                const currentTemp = Math.round(data.current.temperature_2m);
                const prose = getForecastProse(data.daily.weathercode[0] || data.current.weathercode, currentTemp);
                
                document.getElementById('w-stats-box').innerHTML = `
                    <div class='text-xs text-zinc-500 font-bold uppercase tracking-wider mb-1'>Current</div>
                    <div class='text-[64px] leading-none font-black text-white tracking-tighter'>${currentTemp}°</div>
                    
                    <div class='mt-4 flex flex-col gap-2'>
                        <div class='text-sm font-bold text-zinc-400 tracking-wide flex items-center gap-2'>
                            <span class="text-red-400">H: ${Math.round(data.daily.temperature_2m_max[0])}°</span>
                            <span class="text-blue-400">L: ${Math.round(data.daily.temperature_2m_min[0])}°</span>
                        </div>
                        <div class='flex flex-col gap-1 text-[11px] text-zinc-400 font-semibold tracking-wide'>
                            <div class='flex items-center gap-1.5'>
                                <svg class="w-3.5 h-3.5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                                ${riseTime}
                            </div>
                            <div class='flex items-center gap-1.5'>
                                <svg class="w-3.5 h-3.5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                                ${setTime}
                            </div>
                        </div>
                    </div>
                `;
                
                document.getElementById('w-desc-box').innerHTML = `
                    <p class='text-[13px] text-zinc-300 leading-relaxed font-medium'>${prose}</p>
                `;

                const width = 1000;
                const height = 180;
                const amp = 80; 
                const yOffset = 90;
                
                // Dublin tide approx: High ~17:00 (17.0 hours)
                const offset = currentLoc === 'dg' ? -(17/24) * Math.PI * 2 : -(18/24) * Math.PI * 2; 
                
                let pathD = `M 0 ${yOffset + amp * Math.cos(offset)} `;
                for (let i = 0; i <= width; i += 5) {
                    const x = i;
                    const y = yOffset + amp * Math.cos((i / width) * Math.PI * 2 + offset);
                    pathD += `L ${x} ${y} `;
                }

                const now = new Date();
                const currentHour = now.getHours() + (now.getMinutes() / 60);
                const xPos = (currentHour / 24) * width;
                const currentY = yOffset + amp * Math.cos((currentHour / 24) * Math.PI * 2 + offset);
                
                // Derivative of cos(x) is -sin(x). If slope is negative, Y is decreasing (going UP visually on screen).
                const slope = -Math.sin((currentHour / 24) * Math.PI * 2 + offset);
                const isRising = slope < 0; 
                const statusColor = isRising ? '#10b981' : '#ef4444'; 

                document.getElementById('tide-graph-wrapper').innerHTML = `
                    <svg viewBox="0 0 1000 180" class="w-full h-full absolute inset-0 overflow-visible" preserveAspectRatio="none">
                        <!-- Horizontal Grid Lines (subtle) -->
                        <line x1="0" y1="50" x2="1000" y2="50" stroke="#27272a" stroke-width="1" stroke-dasharray="4,4" />
                        <line x1="0" y1="130" x2="1000" y2="130" stroke="#27272a" stroke-width="1" stroke-dasharray="4,4" />
                        
                        <!-- The Wave -->
                        <path class="tide-wave" d="${pathD}" />
                        
                        <!-- Current Time Marker -->
                        <line x1="${xPos}" y1="0" x2="${xPos}" y2="180" stroke="${statusColor}" stroke-width="2" stroke-dasharray="6,6" opacity="0.7"/>
                        <circle cx="${xPos}" cy="${currentY}" r="8" fill="${statusColor}" />
                    </svg>
                `;
                
                document.getElementById('tide-high-text').innerText = currentLoc === 'dg' ? '▲ High: 05:04 PM' : '▲ High: 06:10 PM';
                document.getElementById('tide-low-text').innerText = currentLoc === 'dg' ? '▼ Low: 10:22 AM' : '▼ Low: 11:30 AM';

            } catch(e) { 
                document.getElementById('w-stats-box').innerHTML = "<div class='text-red-500 py-4 text-sm'>Error</div>"; 
            }
        }

        async function loadNews() {
            const newsEl = document.getElementById('news-content');
            
            try {
                const fetchWithTimeout = (url, timeout = 8000) => Promise.race([
                    fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`).then(r => r.json()),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), timeout))
                ]);

                const results = await Promise.allSettled(NEWS_FEEDS.map(f => fetchWithTimeout(f)));
                
                const all = results
                    .filter(r => r.status === 'fulfilled' && r.value.items)
                    .flatMap(r => r.value.items)
                    .sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate)); 
                
                if(all.length === 0) throw new Error();
                
                newsEl.innerHTML = all.slice(0, 40).map(i => {
                    const link = (i.link || "").toLowerCase();
                    const srcName = i.source || (link.includes('bbc') ? 'BBC News' : link.includes('rte') ? 'RTÉ News' : link.includes('thejournal') ? 'The Journal' : link.includes('cnn') ? 'CNN' : link.includes('guardian') ? 'The Guardian' : 'News');
                    
                    let brandClass = 'bg-zinc-800 text-white'; 
                    if (link.includes('cnn.com') || link.includes('cnn')) { brandClass = 'bg-red-600 text-white'; }
                    else if (link.includes('bbc')) { brandClass = 'bg-yellow-400 text-black'; }
                    else if (link.includes('rte')) { brandClass = 'bg-sky-500 text-white'; }
                    else if (link.includes('thejournal')) { brandClass = 'bg-blue-900 text-white'; }
                    else if (link.includes('guardian')) { brandClass = 'bg-blue-800 text-white'; }

                    // Extract image from RSS enclosure or thumbnail
                    let imgUrl = i.enclosure?.link || i.thumbnail || '';
                    if(!imgUrl && i.content) {
                        const imgMatch = i.content.match(/<img[^>]+src="([^">]+)"/);
                        if(imgMatch) imgUrl = imgMatch[1];
                    }

                    const imgHtml = imgUrl ? 
                        `<img src='${imgUrl}' class='w-20 h-20 rounded-lg object-cover flex-shrink-0 border border-zinc-800' onerror="this.style.display='none'">` : 
                        `<div class='w-20 h-20 rounded-lg bg-zinc-800 flex-shrink-0 flex items-center justify-center border border-zinc-700'><svg class="w-8 h-8 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg></div>`;
                    
                    return `
                        <a href="${i.link}" target="_blank" class='block bg-zinc-900 p-3 rounded-2xl border border-zinc-800 shadow-sm hover:bg-zinc-800/50 transition-colors'>
                            <div class='flex items-start gap-4'>
                                ${imgHtml}
                                <div class="flex-1 min-w-0 pt-0.5">
                                    <span class="inline-block px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-wider mb-1.5 ${brandClass}">${srcName}</span>
                                    <p class='font-bold text-[14px] text-white leading-snug line-clamp-2'>${i.title}</p>
                                    <p class='text-[11px] text-zinc-500 mt-1.5 font-medium'>${timeAgo(i.pubDate)}</p>
                                </div>
                            </div>
                        </a>
                    `;
                }).join('');
            } catch(e) { 
                newsEl.innerHTML = "<div class='text-center py-10 text-zinc-500'>News feeds unavailable right now.</div>"; 
            }
        }

        async function loadWatch() {
            const watchEl = document.getElementById('watch-content');
            
            try {
                const fetchChan = async (ch) => {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 8000);
                    try {
                        const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${ch.id}`, { signal: controller.signal });
                        const data = await res.json();
                        clearTimeout(timeoutId);
                        return (data.items || []).map(v => ({ ...v, author: ch.name }));
                    } catch(e) {
                        return []; 
                    }
                };

                const results = await Promise.allSettled(WATCH_CHANNELS.map(ch => fetchChan(ch)));
                
                const videos = results
                    .filter(r => r.status === 'fulfilled')
                    .flatMap(r => r.value)
                    .sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate)); 
                
                if(videos.length === 0) throw new Error();
                
                watchEl.innerHTML = videos.slice(0, 40).map(v => {
                    return `
                    <a href="${v.link}" target="_blank" class='block bg-zinc-900 p-3 rounded-2xl border border-zinc-800 shadow-sm hover:bg-zinc-800/50 transition-colors'>
                        <div class='flex gap-4 items-start'>
                            <img src='${v.thumbnail}' class='w-[130px] aspect-video rounded-xl object-cover flex-shrink-0 shadow-md border border-zinc-800 bg-zinc-800'>
                            <div class="flex-1 min-w-0 pt-0.5">
                                <h3 class='font-bold text-[13px] text-white leading-tight mb-1.5 line-clamp-2'>${v.title}</h3>
                                <p class='text-[10px] text-zinc-400 font-bold uppercase tracking-wider mb-1.5'>
                                    ${v.author} <span class="mx-1 text-zinc-600">•</span> <span class="text-accent">${timeAgo(v.pubDate)}</span>
                                </p>
                            </div>
                        </div>
                    </a>`;
                }).join('');
            } catch(e) { 
                watchEl.innerHTML = "<div class='text-center py-10 text-red-500'>Video sync failed. Please check network.</div>"; 
            }
        }

        function init() {
            setLoc(currentLoc); 
            document.getElementById('date-display').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            fetchSched(); 
            loadNews(); 
            loadWatch();
        }
        
        init();
    </script>
</body>
</html>
