<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rise Rundown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        (function(){
            const cvs = document.createElement('canvas');
            cvs.width = 180; cvs.height = 180;
            const ctx = cvs.getContext('2d');
            ctx.fillStyle = '#09090b'; 
            ctx.beginPath(); ctx.roundRect(0, 0, 180, 180, 40); ctx.fill();
            const grad = ctx.createLinearGradient(0, 0, 180, 180);
            grad.addColorStop(0, '#f59e0b'); grad.addColorStop(1, '#8b5cf6');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(90, 90, 54, 0, Math.PI * 2); ctx.fill();
            const link = document.createElement('link');
            link.rel = 'apple-touch-icon';
            link.href = cvs.toDataURL('image/png');
            document.head.appendChild(link);
        })();
    </script>

    <style>
        :root { 
            --bg: #09090b; --card: #18181b; --text: #f3f4f6; --accent: #8b5cf6; --border: #27272a; 
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Pinned Frame Architecture */
        .app-container { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Tab Visibility Logic (CRITICAL FIX) */
        .tab-content { display: none !important; height: 100%; }
        .tab-content.active { display: block !important; animation: fadeIn 0.2s ease; }
        #tab-weather.active { display: flex !important; flex-direction: column; } /* Weather requires flex to auto-fit */
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* News Branding Labels */
        .brand-cnn { background-color: #dc2626; color: white; }
        .brand-bbc { background-color: #facc15; color: black; }
        .brand-rte { background-color: #2563eb; color: white; } 
        .brand-journal { background-color: #1e3a8a; color: white; }
        .brand-guardian { background-color: #1e40af; color: white; }
        .brand-default { background-color: #3f3f46; color: white; }
        
        .nav-btn { color: #52525b; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 10px 8px; }
        .nav-btn svg { stroke: currentColor; fill: none; stroke-width: 2; width: 24px; height: 24px; }
        .nav-btn.active { color: var(--accent); }
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
    </style>
</head>

<body class="app-container max-w-md mx-auto bg-zinc-950 shadow-2xl shadow-black relative">

    <header class="flex-none bg-zinc-950/95 backdrop-blur-md border-b border-zinc-800 p-4 flex items-center justify-between z-50">
        <div class="flex items-center gap-3">
            <svg width="36" height="36" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id='gradHead' x1='0' y1='0' x2='1' y2='1'>
                        <stop offset='0%' stop-color='#f59e0b'/>
                        <stop offset='100%' stop-color='#8b5cf6'/>
                    </linearGradient>
                </defs>
                <rect width='100' height='100' rx='22' fill='#18181b'/>
                <circle cx='50' cy='50' r='30' fill='url(#gradHead)'/>
            </svg>
            <div>
                <h1 class="text-xl font-bold text-white tracking-tight leading-none">Rise</h1>
                <p id="date-display" class="text-[10px] text-zinc-400 font-bold uppercase tracking-wider mt-1"></p>
            </div>
        </div>
        <div id="status-indicator" class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)] transition-colors duration-300"></div>
    </header>

    <main class="flex-1 overflow-y-auto overflow-x-hidden hide-scrollbar p-3 relative">
        
        <!-- Weather Tab (Flex configured to fit vertically without scrolling) -->
        <section id="tab-weather" class="tab-content active gap-3">
            
            <div class="flex-none bg-zinc-900 rounded-2xl p-1 flex border border-zinc-800">
                <button onclick="setLoc('dg')" id="btn-dg" class="flex-1 py-2.5 rounded-xl font-bold text-[13px] transition-colors">Deansgrange</button>
                <button onclick="setLoc('sp')" id="btn-sp" class="flex-1 py-2.5 rounded-xl font-bold text-[13px] transition-colors">Spanish Point</button>
            </div>
            
            <div class="flex-1 bg-zinc-900 rounded-3xl p-4 border border-zinc-800 shadow-xl flex flex-col justify-between min-h-[160px]">
                <h2 class="font-bold text-[15px] text-white mb-2">Forecast</h2>
                <div class="flex gap-3 h-full">
                    <!-- LHS: Metrics Grid -->
                    <div id="w-stats-box" class="w-5/12 border-r border-zinc-800 pr-3 flex flex-col justify-center">
                        <div class="animate-pulse w-full h-20 bg-zinc-800 rounded-xl"></div>
                    </div>
                    <!-- RHS: Detailed Description -->
                    <div id="w-desc-box" class="w-7/12 pl-1 flex flex-col justify-center">
                        <div class="text-zinc-500 text-sm">Fetching forecast...</div>
                    </div>
                </div>
            </div>
            
            <div id="tide-content" class="flex-1 bg-zinc-900 p-4 rounded-3xl border border-zinc-800 shadow-xl flex flex-col min-h-[220px]">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <h2 class='font-bold text-[15px] text-white mb-0.5'>Tides</h2>
                        <div id="tide-status" class="text-[11px] font-bold uppercase tracking-wide"></div>
                    </div>
                    <!-- Aligned High/Low Tide Stack -->
                    <div class="text-right">
                        <div class="inline-block text-left">
                            <div id="tide-high-text" class="text-[12px] font-bold text-blue-400">▲ High: --:--</div>
                            <div id="tide-low-text" class="text-[12px] font-bold text-indigo-400 mt-0.5">▼ Low: --:--</div>
                        </div>
                    </div>
                </div>
                
                <div id="tide-graph-wrapper" class="w-full flex-1 relative rounded-xl overflow-hidden border border-zinc-800/50 bg-zinc-950/30">
                    <!-- SVG injected via JS -->
                </div>
            </div>
        </section>

        <section id="tab-schedule" class="tab-content pb-4">
            <div class="flex items-center justify-between gap-3 mb-3">
                <button onclick="changeDay(-1)" class="w-12 h-12 bg-zinc-900 rounded-2xl flex items-center justify-center font-bold text-lg border border-zinc-800 hover:bg-zinc-800 active:scale-95 transition-all text-zinc-400">◀</button>
                <button onclick="resetDay()" id="day-label" class="flex-1 h-12 bg-zinc-900 rounded-2xl flex items-center justify-center font-extrabold text-[15px] uppercase tracking-wide border border-zinc-800 hover:bg-zinc-800 active:scale-95 transition-all text-white">Today</button>
                <button onclick="changeDay(1)" class="w-12 h-12 bg-zinc-900 rounded-2xl flex items-center justify-center font-bold text-lg border border-zinc-800 hover:bg-zinc-800 active:scale-95 transition-all text-zinc-400">▶</button>
            </div>
            <div id="sched-content" class="space-y-3">
                <div class='text-center text-zinc-500 py-10 font-medium animate-pulse'>Syncing Calendar...</div>
            </div>
        </section>

        <section id="tab-news" class="tab-content pb-4">
            <div id="news-content" class="space-y-3">
                <div class='text-center text-zinc-500 py-10 font-medium animate-pulse'>Aggregating global sources...</div>
            </div>
        </section>

        <section id="tab-watch" class="tab-content pb-4">
            <div id="watch-content" class="space-y-3">
                <div class='text-center text-zinc-500 py-10 font-medium animate-pulse'>Syncing channels...</div>
            </div>
        </section>
    </main>

    <nav class="flex-none bg-zinc-950 border-t border-zinc-800 flex justify-between px-2 pt-1 pb-safe z-50">
        <button onclick="switchTab('weather', this)" class="nav-btn active">
            <svg viewBox="0 0 24 24"><path d="M17.5 19C19.9853 19 22 16.9853 22 14.5C22 12.1332 20.1818 10.2016 17.8596 10.021C17.4103 6.64333 14.5218 4 11 4C7.13401 4 4 7.13401 4 11C4 11.2374 4.01183 11.472 4.03478 11.7032C2.29828 12.3596 1 14.0253 1 16C1 18.2091 2.79086 20 5 20H17.5Z"/></svg>
            Weather
        </button>
        <button onclick="switchTab('schedule', this)" class="nav-btn">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Schedule
        </button>
        <button onclick="switchTab('news', this)" class="nav-btn">
            <svg viewBox="0 0 24 24"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
            News
        </button>
        <button onclick="switchTab('watch', this)" class="nav-btn">
            <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><polygon points="10 8 16 12 10 16 10 8"/><line x1="8" y1="21" x2="16" y2="21"/></svg>
            Watch
        </button>
    </nav>

    <script>
        const CAL_URL = "https://script.google.com/macros/s/AKfycbwDBkCnlyjQQvqYF1WVlwszNyrD6EYNaRpy6LHLACJWjy58cO_qpgJsvvdYrQm3DoiyGQ/exec";
        let currentLoc = localStorage.getItem('riseLoc') || 'dg';
        let dayOffset = 0;

        const NEWS_FEEDS = [
            'https://feeds.bbci.co.uk/news/rss.xml',
            'https://www.rte.ie/news/rss/news-headlines.xml',
            'https://www.thejournal.ie/feed/',
            'https://www.theguardian.com/international/rss',
            'http://rss.cnn.com/rss/cnn_topstories.rss' // Explicit CNN feed
        ];

        // Optimized curated list to avoid API rate limits while keeping high-value requests
        const WATCH_CHANNELS = [
            { id: 'UC0PEX_z3_18uQzQ511Y2Ogg', name: 'DC Rainmaker' },
            { id: 'UCCxKCCjuHEMA_XFovQJkrtQ', name: 'Kermode and Mayo' },
            { id: 'UCDiC215i-0C4M97W483k0bA', name: 'CNN' },
            { id: 'UC16niRr50-MSBwiO3YDb3RA', name: 'BBC News' },
            { id: 'UC_I_J8D7B2-BvIOMu1o5t3Q', name: 'RTÉ News' },
            { id: 'UC9K540f2b_1N3y0m1l5lO2w', name: 'SNL' },
            { id: 'UCi7GJNg51C3jgmYTUwqoRVw', name: 'SmartLess' },
            { id: 'UC3XTzVzaHQEd30rQbuvCtWQ', name: 'Last Week Tonight' },
            { id: 'UC8-Th83bH_thdKZDJCrn88g', name: 'Seth Meyers' },
            { id: 'UCMtFAi84ehTSYSE9XoHefig', name: 'Stephen Colbert' },
            { id: 'UCMb0O2CdPBNi-QqPk5T3gsQ', name: 'James Hoffmann' },
            { id: 'UCaXgeReu2G1X7bY1483G2-A', name: 'MKBHD' },
            { id: 'UCcgqMZvAkyA-EaaZvu2n0ng', name: 'Bloomberg' },
            { id: 'UCK7tptYoggEXpdOwRGUbmVA', name: 'WSJ' },
            { id: 'UC0hQpeHKPEAAMY4pYgYk-fA', name: 'Letterman' }
        ];

        function timeAgo(dateString) {
            const date = new Date(dateString);
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = Math.floor(seconds / 31536000);
            if (interval >= 1) return interval === 1 ? "1 year ago" : `${interval} years ago`;
            interval = Math.floor(seconds / 2592000);
            if (interval >= 1) return interval === 1 ? "1 month ago" : `${interval} months ago`;
            interval = Math.floor(seconds / 86400);
            if (interval >= 1) return interval === 1 ? "1 day ago" : `${interval} days ago`;
            interval = Math.floor(seconds / 3600);
            if (interval >= 1) return interval === 1 ? "1 hour ago" : `${interval} hours ago`;
            interval = Math.floor(seconds / 60);
            if (interval >= 1) return interval === 1 ? "1 min ago" : `${interval} mins ago`;
            return "Just now";
        }

        function formatTime(isoString) {
            if (!isoString) return "--:--";
            const d = new Date(isoString);
            let h = d.getHours();
            let m = d.getMinutes();
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            m = m < 10 ? '0' + m : m;
            return `${h}:${m} ${ampm}`;
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('tab-' + id).classList.add('active');
            btn.classList.add('active');
        }

        function setLoc(loc) {
            currentLoc = loc;
            localStorage.setItem('riseLoc', loc);
            
            document.getElementById('btn-dg').className = loc === 'dg' ? 
                'flex-1 py-2.5 rounded-xl font-bold text-[13px] bg-zinc-800 text-white shadow-sm transition-colors' : 
                'flex-1 py-2.5 rounded-xl font-bold text-[13px] text-zinc-500 transition-colors';
            
            document.getElementById('btn-sp').className = loc === 'sp' ? 
                'flex-1 py-2.5 rounded-xl font-bold text-[13px] bg-zinc-800 text-white shadow-sm transition-colors' : 
                'flex-1 py-2.5 rounded-xl font-bold text-[13px] text-zinc-500 transition-colors';
                
            loadWeather();
        }

        async function fetchSched() {
            const date = new Date(); 
            date.setDate(date.getDate() + dayOffset);
            const dStr = date.toISOString().split('T')[0];
            
            let display = dayOffset === 0 ? "Today" : 
                          dayOffset === 1 ? "Tomorrow" : 
                          dayOffset === -1 ? "Yesterday" : 
                          date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric'});
            
            document.getElementById('day-label').innerText = display;
            const content = document.getElementById('sched-content');
            
            content.innerHTML = "<div class='text-center text-zinc-500 py-10 animate-pulse font-medium'>Syncing Calendar...</div>";
            document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.5)]";

            try {
                const res = await fetch(`${CAL_URL}?date=${dStr}`);
                const data = await res.json();
                
                if(data.status === "error") throw new Error(data.message);
                
                if(data.events && data.events.length > 0) {
                    content.innerHTML = data.events.map(e => `
                        <div class='bg-zinc-900 p-4 rounded-2xl border border-zinc-800 shadow-sm flex items-start gap-4'>
                            <div class="flex-1">
                                <p class='font-bold text-[16px] text-white leading-snug'>${e.title}</p>
                                <p class='text-[13px] text-zinc-400 mt-1.5 font-medium flex items-center gap-2'>
                                    <span class="bg-zinc-800 text-accent px-2 py-0.5 rounded text-xs tracking-wide">${e.time}</span>
                                    <span>${e.calendarName}</span>
                                </p>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]";
                } else {
                    content.innerHTML = `<div class='text-center py-20 text-zinc-500 text-lg'>No events scheduled for ${display.toLowerCase()}.</div>`;
                    document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]";
                }
            } catch(e) { 
                content.innerHTML = "<div class='text-center py-10 text-red-500 font-medium bg-red-950/30 rounded-xl border border-red-900/50 p-4'>Calendar Sync Error. Check Bridge URL.</div>"; 
                document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]";
            }
        }

        function changeDay(delta) { dayOffset += delta; fetchSched(); }
        function resetDay() { dayOffset = 0; fetchSched(); }

        function getForecastProse(code, temp) {
            let prose = "";
            if (code <= 1) prose = "☀️ A crisp, clear day starting bright and maintaining extensive sunny spells throughout the afternoon.";
            else if (code <= 3) prose = "⛅ A gentle mix of cloud cover and sunshine. Remaining largely dry and settled for the day.";
            else if (code <= 48) prose = "🌫️ Starting with dense fog and mist, expected to clear slowly as the day progresses.";
            else if (code <= 67) prose = "🌧️ Overcast conditions prevailing today with intermittent periods of light rain or drizzle.";
            else if (code <= 77) prose = "❄️ Cold conditions bringing a likelihood of snow showers or sleet.";
            else prose = "⛈️ Unsettled weather expected with heavy rain and potential stormy conditions.";
            
            if (temp < 10) prose += " Wrap up warm as temperatures remain quite chilly.";
            else if (temp >= 20) prose += " Genuinely warm outside, perfect for outdoor activities.";
            
            return prose;
        }

        async function loadWeather() {
            const lat = currentLoc === 'dg' ? 53.28 : 52.85;
            const lon = currentLoc === 'dg' ? -6.15 : -9.53;
            
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode,sunrise,sunset&current=temperature_2m,weathercode&timezone=auto`);
                const data = await res.json();
                
                const currentTemp = Math.round(data.current.temperature_2m);
                const prose = getForecastProse(data.daily.weathercode[0] || data.current.weathercode, currentTemp);
                
                document.getElementById('w-stats-box').innerHTML = `
                    <div class='text-[11px] text-zinc-500 font-bold uppercase tracking-wider mb-0.5'>Current</div>
                    <div class='text-[48px] leading-none font-black text-white tracking-tighter mb-4'>${currentTemp}°</div>
                    
                    <div class='flex gap-4'>
                        <!-- Left Sub-column: H/L -->
                        <div class='flex flex-col gap-1.5 text-[13px] font-bold tracking-wide w-1/2'>
                            <span class="text-red-400">H: ${Math.round(data.daily.temperature_2m_max[0])}°</span>
                            <span class="text-blue-400">L: ${Math.round(data.daily.temperature_2m_min[0])}°</span>
                        </div>
                        <!-- Right Sub-column: Sun -->
                        <div class='flex flex-col gap-1.5 text-[12px] text-zinc-300 font-semibold tracking-wide w-1/2'>
                            <div class='flex items-center gap-1.5 whitespace-nowrap'>
                                <span class="text-amber-500">☀️</span> ${formatTime(data.daily.sunrise[0])}
                            </div>
                            <div class='flex items-center gap-1.5 whitespace-nowrap'>
                                <span class="text-indigo-400">🌙</span> ${formatTime(data.daily.sunset[0])}
                            </div>
                        </div>
                    </div>
                `;
                
                document.getElementById('w-desc-box').innerHTML = `
                    <p class='text-[13px] text-zinc-300 leading-relaxed font-medium'>${prose}</p>
                `;

                // Tide Math: Semi-Diurnal (12.4 hrs). Peak ~17.1 (05:06 PM)
                const width = 1000;
                const height = 180;
                const amp = 60; 
                const yOffset = 70; 
                const period = 12.416;
                const peakHour = currentLoc === 'dg' ? 17.1 : 17.8; 
                
                let pathD = `M 0 ${yOffset + amp * Math.cos((0 - peakHour) * 2 * Math.PI / period)} `;
                for (let i = 0; i <= width; i += 5) {
                    const h = (i / width) * 24; 
                    const y = yOffset - amp * Math.cos((h - peakHour) * 2 * Math.PI / period);
                    pathD += `L ${i} ${y} `;
                }

                const now = new Date();
                const currentHour = now.getHours() + (now.getMinutes() / 60);
                const xPos = (currentHour / 24) * width;
                
                const slope = -Math.sin((currentHour - peakHour) * 2 * Math.PI / period);
                const isRising = slope > 0; 
                
                const statusColor = isRising ? '#10b981' : '#ef4444'; 
                const statusText = isRising ? '▲ Tide is Rising' : '▼ Tide is Falling';
                
                document.getElementById('tide-status').innerText = statusText;
                document.getElementById('tide-status').style.color = statusColor;
                
                document.getElementById('tide-high-text').innerText = currentLoc === 'dg' ? '▲ High: 05:06 PM' : '▲ High: 06:10 PM';
                document.getElementById('tide-low-text').innerText = currentLoc === 'dg' ? '▼ Low: 10:21 AM' : '▼ Low: 11:30 AM';

                // Construct Axis Ticks
                let axisHtml = '';
                for (let h = 0; h <= 24; h++) {
                    const tickX = (h / 24) * width;
                    if (h % 6 === 0 && h !== 24) { // Major ticks: 00, 06, 12, 18
                        let anchor = "middle";
                        if (h === 0) anchor = "start";
                        axisHtml += `
                            <line x1="${tickX}" y1="150" x2="${tickX}" y2="158" stroke="#52525b" stroke-width="2" />
                            <text x="${tickX + (h===0 ? 4 : 0)}" y="174" fill="#a1a1aa" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="${anchor}">${h.toString().padStart(2, '0')}:00</text>
                        `;
                    } else if (h !== 24) { // Minor ticks
                        axisHtml += `<line x1="${tickX}" y1="150" x2="${tickX}" y2="154" stroke="#3f3f46" stroke-width="1.5" />`;
                    }
                }

                document.getElementById('tide-graph-wrapper').innerHTML = `
                    <svg viewBox="0 0 1000 180" class="w-full h-full absolute inset-0" preserveAspectRatio="none">
                        <!-- The Wave -->
                        <path d="${pathD}" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                        
                        <!-- Current Time Marker (Green Dashed Line, No Dot) -->
                        <line x1="${xPos}" y1="0" x2="${xPos}" y2="150" stroke="#10b981" stroke-width="3" stroke-dasharray="8,6" opacity="0.9"/>
                        
                        <!-- Time Axis -->
                        ${axisHtml}
                    </svg>
                `;

            } catch(e) { 
                document.getElementById('w-stats-box').innerHTML = "<div class='text-red-500 py-4 text-sm'>Forecast Error</div>"; 
            }
        }

        async function loadNews() {
            const newsEl = document.getElementById('news-content');
            
            try {
                const fetchWithTimeout = (url, timeout = 8000) => Promise.race([
                    fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`).then(r => r.json()),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), timeout))
                ]);

                const results = await Promise.allSettled(NEWS_FEEDS.map(f => fetchWithTimeout(f)));
                
                const all = results
                    .filter(r => r.status === 'fulfilled' && r.value.items)
                    .flatMap(r => r.value.items)
                    .sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate)); 
                
                if(all.length === 0) throw new Error();
                
                newsEl.innerHTML = all.slice(0, 40).map(i => {
                    const link = (i.link || "").toLowerCase();
                    const srcName = i.source || (link.includes('bbc') ? 'BBC News' : link.includes('rte') ? 'RTÉ News' : link.includes('thejournal') ? 'The Journal' : link.includes('cnn') ? 'CNN' : link.includes('guardian') ? 'The Guardian' : 'News');
                    
                    let brandClass = 'bg-zinc-800 text-white'; 
                    if (link.includes('cnn.com') || link.includes('cnn')) { brandClass = 'bg-red-600 text-white'; }
                    else if (link.includes('bbc')) { brandClass = 'bg-yellow-400 text-black'; }
                    else if (link.includes('rte')) { brandClass = 'bg-blue-500 text-white'; }
                    else if (link.includes('thejournal')) { brandClass = 'bg-indigo-900 text-white'; }
                    else if (link.includes('guardian')) { brandClass = 'bg-blue-800 text-white'; }

                    // Extract actual article image
                    let imgUrl = i.enclosure?.link || i.thumbnail || '';
                    if(!imgUrl && i.content) {
                        const imgMatch = i.content.match(/<img[^>]+src="([^">]+)"/);
                        if(imgMatch) imgUrl = imgMatch[1];
                    }

                    const imgHtml = imgUrl ? 
                        `<img src='${imgUrl}' class='w-[90px] h-[90px] rounded-xl object-cover flex-shrink-0 border border-zinc-800' onerror="this.src='https://placehold.co/90x90/18181b/52525b?text=News'">` : 
                        `<div class='w-[90px] h-[90px] rounded-xl bg-zinc-800 flex-shrink-0 flex items-center justify-center border border-zinc-700'><svg class="w-8 h-8 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg></div>`;
                    
                    return `
                        <a href="${i.link}" target="_blank" class='block bg-zinc-900 p-3 rounded-2xl border border-zinc-800 shadow-sm hover:bg-zinc-800/50 transition-colors'>
                            <div class='flex items-start gap-4'>
                                ${imgHtml}
                                <div class="flex-1 min-w-0 pt-0.5">
                                    <span class="inline-block px-1.5 py-0.5 rounded text-[10px] font-black uppercase tracking-wider mb-1.5 ${brandClass}">${srcName}</span>
                                    <p class='font-bold text-[14px] text-white leading-snug line-clamp-2'>${i.title}</p>
                                    <p class='text-[11px] text-zinc-500 mt-1.5 font-medium'>${timeAgo(i.pubDate)}</p>
                                </div>
                            </div>
                        </a>
                    `;
                }).join('');
            } catch(e) { 
                newsEl.innerHTML = "<div class='text-center py-10 text-zinc-500'>News feeds unavailable right now.</div>"; 
            }
        }

        async function loadWatch() {
            const watchEl = document.getElementById('watch-content');
            
            try {
                const fetchChan = async (ch) => {
                    try {
                        // Increased timeout for YouTube batches to avoid drops
                        const res = await Promise.race([
                            fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${ch.id}`),
                            new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 10000))
                        ]);
                        const data = await res.json();
                        return (data.items || []).map(v => ({ ...v, author: ch.name }));
                    } catch(e) {
                        return []; 
                    }
                };

                const results = await Promise.allSettled(WATCH_CHANNELS.map(ch => fetchChan(ch)));
                
                const videos = results
                    .filter(r => r.status === 'fulfilled')
                    .flatMap(r => r.value)
                    .sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate)); 
                
                if(videos.length === 0) throw new Error();
                
                watchEl.innerHTML = videos.slice(0, 40).map(v => {
                    return `
                    <a href="${v.link}" target="_blank" class='block bg-zinc-900 p-3 rounded-2xl border border-zinc-800 shadow-sm hover:bg-zinc-800/50 transition-colors'>
                        <div class='flex gap-4 items-start'>
                            <img src='${v.thumbnail}' class='w-[130px] aspect-video rounded-xl object-cover flex-shrink-0 shadow-md border border-zinc-800 bg-zinc-800'>
                            <div class="flex-1 min-w-0 pt-0.5">
                                <h3 class='font-bold text-[13px] text-white leading-tight mb-1.5 line-clamp-2'>${v.title}</h3>
                                <p class='text-[10px] text-zinc-400 font-bold uppercase tracking-wider mb-1.5'>
                                    ${v.author} <span class="mx-1 text-zinc-600">•</span> <span class="text-accent">${timeAgo(v.pubDate)}</span>
                                </p>
                            </div>
                        </div>
                    </a>`;
                }).join('');
            } catch(e) { 
                watchEl.innerHTML = "<div class='text-center py-10 text-red-500'>Video sync failed. API limit reached.</div>"; 
            }
        }

        function init() {
            document.getElementById('date-display').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            setLoc(currentLoc); // triggers weather & tides
            fetchSched(); 
            loadNews(); 
            loadWatch();
        }
        
        init();
    </script>
</body>
</html>
