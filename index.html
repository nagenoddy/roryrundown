<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rise Rundown Dashboard</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23f59e0b'/%3E%3Cstop offset='100%25' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='%2318181b'/%3E%3Ccircle cx='50' cy='50' r='30' fill='url(%23g)'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23f59e0b'/%3E%3Cstop offset='100%25' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='%2318181b'/%3E%3Ccircle cx='50' cy='50' r='30' fill='url(%23g)'/%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { 
            --bg: #09090b; 
            --card: #18181b; 
            --text: #f3f4f6; 
            --accent: #8b5cf6; 
            --border: #27272a; 
            --emerald: #10b981;
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .sticky-header { 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            background: rgba(9, 9, 11, 0.95); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid var(--border); 
            padding: 16px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        
        .tab-content { display: none; padding-top: 10px; padding-bottom: 120px; }
        .tab-content.active { display: block; }
        
        .nav-container { 
            position: fixed; bottom: 0; width: 100%; max-width: 448px; 
            background: rgba(9, 9, 11, 0.98); border-top: 1px solid var(--border); 
            padding: 12px 10px; display: flex; justify-content: space-between; z-index: 2000; 
        }
        
        .nav-btn { 
            color: #52525b; transition: all 0.2s; display: flex; flex-direction: column; 
            align-items: center; gap: 6px; font-size: 11px; font-weight: 600; 
            padding: 8px 12px; border-radius: 12px;
        }
        .nav-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn.active svg { stroke: var(--accent); }

        .sched-nav { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 24px 0; }
        
        .btn-nav-day { 
            font-size: 1.5rem; font-weight: 800; min-width: 64px; height: 64px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 20px; background: var(--card); color: white; 
            border: 2px solid var(--border); transition: all 0.2s; cursor: pointer;
        }
        .btn-nav-day:active { background: #3f3f46; transform: scale(0.95); border-color: var(--accent); }
        
        .day-label { 
            font-weight: 800; font-size: 1.35rem; color: white; min-width: 130px; 
            text-align: center; text-transform: uppercase; letter-spacing: 0.05em; 
            background: transparent; border: none; cursor: pointer; height: 64px;
        }

        .item-card { 
            background: var(--card); padding: 16px; border-radius: 20px; 
            border: 1px solid var(--border); margin-bottom: 16px; display: flex; gap: 16px; align-items: center; 
        }

        .news-brand-badge {
            width: 48px; height: 48px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.2rem; border: 1px solid rgba(255,255,255,0.1);
        }
        
        .video-item { 
            display: flex; gap: 16px; padding: 16px; background: var(--card); 
            border-radius: 16px; margin-bottom: 12px; align-items: flex-start; 
            border: 1px solid var(--border); 
        }
        
        .video-thumb { 
            width: 110px; height: 80px; background: #27272a; 
            border-radius: 8px; flex-shrink: 0; object-fit: cover; 
        }

        .line-clamp-2 {
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        
        #status-indicator { transition: background 0.3s ease, box-shadow 0.3s ease; }
        
        .tide-graph-container {
            width: 100%; height: 120px; margin-top: 16px; position: relative;
        }
        .tide-wave { fill: rgba(139, 92, 246, 0.15); stroke: var(--accent); stroke-width: 3; }
        .tide-label { font-size: 11px; fill: #a1a1aa; font-weight: 600; }
        .tide-point { fill: var(--text); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative shadow-2xl shadow-black">

    <header class="sticky-header">
        <div class="flex items-center gap-4">
            <svg width="45" height="45" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id='grad' x1='0' y1='0' x2='1' y2='1'>
                        <stop offset='0%' stop-color='#f59e0b'/>
                        <stop offset='100%' stop-color='#8b5cf6'/>
                    </linearGradient>
                </defs>
                <rect width='100' height='100' rx='22' fill='#18181b'/>
                <circle cx='50' cy='50' r='30' fill='url(#grad)'/>
            </svg>
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">Rise</h1>
                <p id="date-display" class="text-sm text-zinc-400 font-medium"></p>
            </div>
        </div>
        <div id="status-indicator" class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
    </header>

    <main class="px-4 pb-20 pt-4">
        
        <section id="tab-weather" class="tab-content active">
            <div class="bg-zinc-900 rounded-2xl p-2 flex border border-zinc-800 mb-6">
                <button onclick="setLoc('dg')" id="btn-dg" class="flex-1 py-3 rounded-xl font-bold text-lg bg-zinc-700 text-white">Deansgrange</button>
                <button onclick="setLoc('sp')" id="btn-sp" class="flex-1 py-3 rounded-xl font-bold text-lg text-zinc-500">Spanish Point</button>
            </div>
            
            <div id="w-content" class="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 mb-6 text-center text-white flex flex-col items-center">
                <div class="animate-pulse w-16 h-16 bg-zinc-800 rounded-full mb-4"></div>
                <div class="text-zinc-500">Fetching Weather...</div>
            </div>
            
            <div id="tide-content" class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 text-center text-white">
                <p class='font-bold text-xl mb-1 text-left px-2'>Tide Forecast</p>
                <div id="tide-graph-wrapper" class="tide-graph-container">
                    <!-- Graph injected via JS -->
                </div>
                <div id="tide-text" class="text-sm text-zinc-400 mt-2 font-medium flex justify-between px-2"></div>
            </div>
        </section>

        <section id="tab-schedule" class="tab-content">
            <div class="sched-nav">
                <button onclick="changeDay(-1)" class="btn-nav-day">◀</button>
                <button onclick="resetDay()" id="day-label" class="day-label">Today</button>
                <button onclick="changeDay(1)" class="btn-nav-day">▶</button>
            </div>
            <div id="sched-content" class="space-y-4">
                <div class='text-center text-zinc-500 py-10'>Loading Calendar...</div>
            </div>
        </section>

        <section id="tab-news" class="tab-content">
            <div class="flex justify-between items-end mb-4 px-1">
                <h2 class="text-xl font-bold text-white">Top Stories</h2>
            </div>
            <div id="news-content" class="space-y-4">
                <div class='text-center text-zinc-500 py-10'>Fetching global articles...</div>
            </div>
        </section>

        <section id="tab-watch" class="tab-content">
            <div class="flex justify-between items-end mb-4 px-1">
                <h2 class="text-xl font-bold text-white">Latest Videos</h2>
            </div>
            <div id="watch-content" class="space-y-4">
                <div class='text-center text-zinc-500 py-10'>Syncing all channels...</div>
            </div>
        </section>
    </main>

    <nav class="nav-container left-1/2 -translate-x-1/2">
        <button onclick="switchTab('weather', this)" class="nav-btn active">
            <svg viewBox="0 0 24 24"><path d="M17.5 19C19.9853 19 22 16.9853 22 14.5C22 12.1332 20.1818 10.2016 17.8596 10.021C17.4103 6.64333 14.5218 4 11 4C7.13401 4 4 7.13401 4 11C4 11.2374 4.01183 11.472 4.03478 11.7032C2.29828 12.3596 1 14.0253 1 16C1 18.2091 2.79086 20 5 20H17.5Z"/></svg>
            Weather
        </button>
        <button onclick="switchTab('schedule', this)" class="nav-btn">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Schedule
        </button>
        <button onclick="switchTab('news', this)" class="nav-btn">
            <svg viewBox="0 0 24 24"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
            News
        </button>
        <button onclick="switchTab('watch', this)" class="nav-btn">
            <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><path d="M10 8l6 3-6 3V8z"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            Watch
        </button>
    </nav>

    <script>
        // CORE CONFIGURATION
        const CAL_URL = "https://script.google.com/macros/s/AKfycbwDBkCnlyjQQvqYF1WVlwszNyrD6EYNaRpy6LHLACJWjy58cO_qpgJsvvdYrQm3DoiyGQ/exec";
        let currentLoc = 'dg', dayOffset = 0;

        const NEWS_FEEDS = [
            'https://feeds.bbci.co.uk/news/rss.xml',
            'https://www.rte.ie/news/rss/news-headlines.xml',
            'https://www.thejournal.ie/feed/',
            'https://www.theguardian.com/international/rss',
            'https://feeds.cnn.com/rss/edition.rss'
        ];

        // Expanded Channel List
        const WATCH_CHANNELS = [
            { id: 'UC9K540f2b_1N3y0m1l5lO2w', name: 'SNL' },
            { id: 'UCqFzWxSCi39LnW1ZAveBgOA', name: 'Team Coco' },
            { id: 'UCi7GJNg51C3jgmYTUwqoRVw', name: 'SmartLess' },
            { id: 'UC3XTzVzaHQEd30rQbuvCtWQ', name: 'Last Week Tonight' },
            { id: 'UCbZ2GqPqj-7dD7S0Vn8e2kQ', name: 'Daily Show' },
            { id: 'UC8-Th83bH_thdKZDJCrn88g', name: 'Seth Meyers' }, // Late Night
            { id: 'UCu2U6x65aC04p-2V675cQ3A', name: 'Off Menu' },
            { id: 'UCMb0O2CdPBNi-QqPk5T3gsQ', name: 'James Hoffmann' },
            { id: 'UCjwpGhw0h5_1oH0R0sioeAw', name: 'Lance Hedrick' },
            { id: 'UC0PEX_z3_18uQzQ511Y2Ogg', name: 'DC Rainmaker' },
            { id: 'UCaXgeReu2G1X7bY1483G2-A', name: 'MKBHD' },
            { id: 'UCa6RRisU52o5-n6S1X9_J3g', name: 'Linus Tech Tips' }
        ];

        function timeAgo(dateString) {
            const date = new Date(dateString);
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " days ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " hours ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " mins ago";
            return Math.floor(seconds) + " seconds ago";
        }

        function getBrandIdentity(sourceName) {
            const src = sourceName.toLowerCase();
            if (src.includes('cnn')) return 'bg-red-600 text-white border-red-800';
            if (src.includes('bbc')) return 'bg-yellow-400 text-black border-yellow-600';
            if (src.includes('journal')) return 'bg-blue-600 text-white border-blue-800';
            if (src.includes('rté') || src.includes('rte')) return 'bg-emerald-800 text-white border-emerald-900';
            if (src.includes('guardian')) return 'bg-blue-900 text-white border-blue-950';
            return 'bg-zinc-700 text-white border-zinc-600'; // Default
        }

        function extractSummary(htmlString) {
            const doc = new DOMParser().parseFromString(htmlString, 'text/html');
            const text = doc.body.textContent || "";
            return text.replace(/\s+/g, ' ').trim().substring(0, 90) + '...';
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            btn.classList.add('active');
        }

        async function fetchSched() {
            const date = new Date(); 
            date.setDate(date.getDate() + dayOffset);
            const dStr = date.toISOString().split('T')[0];
            const display = dayOffset === 0 ? "Today" : (dayOffset === 1 ? "Tomorrow" : (dayOffset === -1 ? "Yesterday" : date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric'})));
            
            document.getElementById('day-label').innerText = display;
            const content = document.getElementById('sched-content');
            
            content.innerHTML = "<div class='text-center text-zinc-500 py-10'>Syncing Calendar...</div>";
            document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.5)]";

            try {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), 6000);
                const res = await fetch(`${CAL_URL}?date=${dStr}`, { signal: controller.signal });
                const data = await res.json();
                clearTimeout(id);
                
                if(data.status === "error") throw new Error(data.message);
                
                if(data.events && data.events.length > 0) {
                    content.innerHTML = data.events.map(e => `
                        <div class='item-card'>
                            <div class="flex-1">
                                <p class='font-bold text-xl text-white'>${e.title}</p>
                                <p class='text-md text-zinc-400 mt-1 font-medium'>
                                    <span class="text-accent">${e.time}</span> • ${e.calendarName}
                                </p>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]";
                } else {
                    content.innerHTML = `<div class='text-center py-20 text-zinc-500 text-lg'>No events scheduled for ${display.toLowerCase()}.</div>`;
                    document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]";
                }
            } catch(e) { 
                content.innerHTML = "<div class='text-center py-10 text-red-500 font-medium bg-red-950/30 rounded-xl border border-red-900/50 p-4'>Calendar Sync Error. Check Scripts or Network.</div>"; 
                document.getElementById('status-indicator').className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]";
            }
        }

        function changeDay(delta) { dayOffset += delta; fetchSched(); }
        function resetDay() { dayOffset = 0; fetchSched(); }

        function setLoc(loc) {
            currentLoc = loc;
            document.getElementById('btn-dg').className = loc === 'dg' ? 'flex-1 py-3 rounded-xl font-bold text-lg bg-zinc-700 text-white transition-colors' : 'flex-1 py-3 rounded-xl font-bold text-lg text-zinc-500 transition-colors';
            document.getElementById('btn-sp').className = loc === 'sp' ? 'flex-1 py-3 rounded-xl font-bold text-lg bg-zinc-700 text-white transition-colors' : 'flex-1 py-3 rounded-xl font-bold text-lg text-zinc-500 transition-colors';
            loadWeather();
        }

        function getWeatherSynopsis(code) {
            if (code <= 1) return "Clear & Bright ☀️";
            if (code <= 3) return "Partly Cloudy ⛅";
            if (code <= 48) return "Foggy 🌫️";
            if (code <= 67) return "Rain Expected 🌧️";
            if (code <= 77) return "Snow Showers ❄️";
            return "Stormy ⛈️";
        }

        function renderTideGraph(isDG) {
            // Generating a visual sine wave path
            const width = 1000;
            const height = 120;
            let pathD = `M 0 ${height} `;
            
            // Spanish Point has higher amplitude, Deansgrange is flatter in our mock visual
            const amp = isDG ? 30 : 45; 
            const offset = isDG ? 0 : Math.PI; // Shift phase slightly

            for (let i = 0; i <= width; i += 10) {
                // Map i to a full sine wave cycle
                const x = i;
                const y = (height / 2) + amp * Math.sin((i / width) * Math.PI * 2 + offset);
                pathD += `L ${x} ${y} `;
            }
            pathD += `L ${width} ${height} Z`;

            const highText = isDG ? 'High: 14:30' : 'High: 15:10';
            const lowText = isDG ? 'Low: 20:15' : 'Low: 21:00';

            document.getElementById('tide-graph-wrapper').innerHTML = `
                <svg viewBox="0 0 1000 120" class="w-full h-full rounded-xl overflow-hidden bg-[#0f0f13]">
                    <path class="tide-wave" d="${pathD}" />
                    <circle cx="500" cy="${(height / 2) + amp * Math.sin(Math.PI + offset)}" r="6" class="tide-point" />
                </svg>
            `;
            document.getElementById('tide-text').innerHTML = `<span>↓ ${lowText}</span><span>↑ ${highText}</span>`;
        }

        async function loadWeather() {
            const lat = currentLoc === 'dg' ? 53.28 : 52.85;
            const lon = currentLoc === 'dg' ? -6.15 : -9.53;
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&current=temperature_2m,weathercode`);
                const data = await res.json();
                const synopsis = getWeatherSynopsis(data.current.weathercode);
                
                document.getElementById('w-content').innerHTML = `
                    <div class='text-7xl font-black text-white tracking-tighter'>${Math.round(data.current.temperature_2m)}°</div>
                    <div class='text-lg font-semibold text-accent mt-2'>${synopsis}</div>
                    <div class='text-md text-zinc-400 mt-2 font-medium bg-zinc-800/50 px-4 py-2 rounded-full'>
                        H: ${Math.round(data.daily.temperature_2m_max[0])}° &nbsp;•&nbsp; L: ${Math.round(data.daily.temperature_2m_min[0])}°
                    </div>
                `;
                renderTideGraph(currentLoc === 'dg');
            } catch(e) { 
                document.getElementById('w-content').innerHTML = "<div class='text-red-500 py-4'>Weather data unavailable.</div>"; 
            }
        }

        async function loadNews() {
            const newsEl = document.getElementById('news-content');
            
            try {
                const fetchWithTimeout = (url, timeout = 5000) => Promise.race([
                    fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`).then(r => r.json()),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), timeout))
                ]);

                // Promise.allSettled ensures one broken feed doesn't crash the whole tab
                const results = await Promise.allSettled(NEWS_FEEDS.map(f => fetchWithTimeout(f)));
                const all = results
                    .filter(r => r.status === 'fulfilled' && r.value.items)
                    .flatMap(r => r.value.items)
                    .sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));
                
                if(all.length === 0) throw new Error();
                
                newsEl.innerHTML = all.slice(0, 30).map(i => {
                    const src = i.source || i.feed?.title || 'News';
                    const brandClasses = getBrandIdentity(src);
                    const letter = src.charAt(0).toUpperCase();
                    const timeStr = timeAgo(i.pubDate);
                    
                    return `
                        <div class='item-card'>
                            <div class="news-brand-badge ${brandClasses}">${letter}</div>
                            <div class="flex-1">
                                <p class='font-bold text-[15px] text-white leading-snug'>${i.title}</p>
                                <p class='text-[12px] text-zinc-400 mt-2 font-semibold uppercase tracking-wider'>
                                    ${src} <span class="mx-1 text-zinc-600">•</span> <span class="text-zinc-500 lowercase">${timeStr}</span>
                                </p>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch(e) { 
                newsEl.innerHTML = "<div class='text-center py-10 text-zinc-500'>News feed unavailable or timed out.</div>"; 
            }
        }

        async function loadWatch() {
            const watchEl = document.getElementById('watch-content');
            
            try {
                const fetchChan = async (ch) => {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${ch.id}`);
                    const data = await res.json();
                    return (data.items || []).map(v => ({ ...v, author: ch.name }));
                };

                // Using Promise.allSettled for maximum stability when fetching 10+ channels
                const results = await Promise.allSettled(WATCH_CHANNELS.map(ch => fetchChan(ch)));
                const videos = results
                    .filter(r => r.status === 'fulfilled')
                    .flatMap(r => r.value)
                    .sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));
                
                if(videos.length === 0) throw new Error();
                
                watchEl.innerHTML = videos.slice(0, 40).map(v => {
                    const timeStr = timeAgo(v.pubDate);
                    const summary = extractSummary(v.description);
                    
                    return `
                    <div class='video-item'>
                        <img src='${v.thumbnail}' class='video-thumb' onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect width=%22100%22 height=%22100%22 fill=%22%2327272a%22/></svg>'">
                        <div class="flex-1 overflow-hidden">
                            <p class='font-bold text-[14px] text-white leading-tight mb-1'>${v.title}</p>
                            <p class='text-[11px] text-zinc-400 font-bold uppercase tracking-wider mb-1'>
                                ${v.author} <span class="mx-1 text-zinc-600">•</span> <span class="text-zinc-500 lowercase font-medium">${timeStr}</span>
                            </p>
                            <p class='text-[12px] text-zinc-500 line-clamp-2 leading-snug'>${summary}</p>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) { 
                watchEl.innerHTML = "<div class='text-center py-10 text-red-500'>Video sync failed. Please refresh.</div>"; 
            }
        }

        function init() {
            document.getElementById('date-display').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            fetchSched(); 
            loadWeather(); 
            loadNews(); 
            loadWatch();
        }
        
        init();
    </script>
</body>
</html>
